<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKA Digital SD Portal - Tema Merah Putih</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* CSS KHUSUS PRINT */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body, html, #root { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                height: auto !important; 
                overflow: visible !important;
                display: block !important;
                position: static !important;
            }
            .h-screen, .overflow-hidden, .overflow-y-auto {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            .print-hidden { display: none !important; }
            .print-visible { display: block !important; }
            
            .print-card-container { display: flex !important; flex-wrap: wrap !important; justify-content: space-between !important; width: 100% !important; gap: 0 !important; }
            .print-card { width: 48% !important; height: 52mm !important; display: inline-block !important; margin-bottom: 5mm !important; padding: 6px !important; border: 1px solid #000 !important; border-radius: 8px !important; box-sizing: border-box !important; page-break-inside: avoid !important; break-inside: avoid !important; }

            table { page-break-inside: auto !important; width: 100% !important; border-collapse: collapse !important; }
            tr { page-break-inside: avoid !important; page-break-after: auto !important; }
            th { background-color: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: black !important; }
            td { border: 1px solid #cbd5e1 !important; color: black !important; }
            thead { display: table-header-group !important; }
            tfoot { display: table-footer-group !important; }

            .rekap-table { font-size: 10px !important; }
            .rekap-table th, .rekap-table td { padding: 4px !important; word-break: break-word; }

            .print-title { font-size: 11px !important; font-weight: 900 !important; margin: 0 !important; line-height: 1.2 !important; color: black !important;}
            .print-subtitle { font-size: 8px !important; font-weight: bold !important; margin: 0 !important; color: black !important;}
            .print-text-tiny { font-size: 8px !important; line-height: 1.1 !important; margin: 0 !important; color: black !important;}
            .print-text-small { font-size: 10px !important; line-height: 1.1 !important; margin: 0 !important; color: black !important;}
            .print-qr { width: 45px !important; height: 45px !important; }
            .print-logo { height: 22px !important; margin-bottom: 2px !important; }
        }
        
        @media screen { .print-visible { display: none !important; } }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxfVijQibVnQ-H0B-PgQto6n8c8qy1gIOEHmjy-nSngnXCT0FKCqI2ouoaEw2XW8UfZ/exec";

        const getSafeImageUrl = (url) => {
            if (!url) return '';
            let str = String(url).trim();
            if (str.includes('drive.google.com')) {
                const match = str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return str;
        };

        const isImageUrl = (val) => {
            if (!val) return false;
            const str = String(val).trim().toLowerCase();
            return str.startsWith('data:image') || str.includes('drive.google.com') || str.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i);
        };

        const MAPEL_LIST = ['PAI', 'PKN', 'B.INDONESIA', 'MATEMATIKA', 'IPAS', 'PJOK', 'SENI', 'B.INGGRIS'];
        const SESI_LIST = ['SESI 1', 'SESI 2', 'SESI 3', 'SESI 4'];

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('loading'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [activeExam, setActiveExam] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');

            const [dbSiswa, setDbSiswa] = useState([]);
            const [dbSoal, setDbSoal] = useState([]);
            const [dbJadwal, setDbJadwal] = useState([]);
            const [dbHasil, setDbHasil] = useState([]);
            const [dbGuru, setDbGuru] = useState([]);

            const [appConfig, setAppConfig] = useState(() => {
                const saved = localStorage.getItem('tka_app_config');
                return saved ? JSON.parse(saved) : { 
                    namaSekolah: 'SD NEGERI 1 MERAH PUTIH', 
                    namaUjian: 'Ujian Akhir Semester', 
                    logo: '', loginBackground: '',
                    daftarRombel: 'Kelas 1,Kelas 2,Kelas 3,Kelas 4,Kelas 5,Kelas 6',
                    adminUser: 'admin', adminPass: 'admin'
                };
            });

            useEffect(() => { localStorage.setItem('tka_app_config', JSON.stringify(appConfig)); }, [appConfig]);

            useEffect(() => {
                const fetchAllData = async (url) => {
                    try {
                        const [resSiswa, resSoal, resJadwal, resHasil, resGuru, resConfig] = await Promise.all([
                            fetch(`${url}?action=getData&sheet=DB_Siswa`).then(r => r.json()),
                            fetch(`${url}?action=getData&sheet=DB_Bank_Soal`).then(r => r.json()),
                            fetch(`${url}?action=getData&sheet=DB_Jadwal`).then(r => r.json()),
                            fetch(`${url}?action=getData&sheet=DB_Hasil`).then(r => r.json()),
                            fetch(`${url}?action=getData&sheet=DB_Guru`).then(r => r.json()),
                            fetch(`${url}?action=getData&sheet=DB_Pengaturan`).then(r => r.json()).catch(() => ({ status: 'error' }))
                        ]);

                        if (resSiswa.status === 'success') setDbSiswa((resSiswa.data || []).filter(s => s && s.NISN));
                        if (resSoal.status === 'success') setDbSoal((resSoal.data || []).filter(s => s && s.ID_Soal));
                        if (resJadwal.status === 'success') setDbJadwal((resJadwal.data || []).filter(j => j && j.ID_Tes));
                        if (resHasil.status === 'success') setDbHasil((resHasil.data || []).filter(h => h && h.NISN));
                        if (resGuru.status === 'success') setDbGuru((resGuru.data || []).filter(g => g && g.Username));

                        if (resConfig && resConfig.status === 'success' && resConfig.data) {
                            const newConfig = { ...appConfig };
                            resConfig.data.forEach(item => { if(item && item.Key && item.Value !== undefined) newConfig[item.Key] = item.Value; });
                            if(!newConfig.daftarRombel) newConfig.daftarRombel = 'Kelas 1,Kelas 2,Kelas 3,Kelas 4,Kelas 5,Kelas 6';
                            if(!newConfig.adminUser) newConfig.adminUser = 'admin';
                            if(!newConfig.adminPass) newConfig.adminPass = 'admin';
                            setAppConfig(newConfig);
                        }

                        const savedUser = localStorage.getItem('tka_current_user');
                        if (savedUser) {
                            const parsedUser = JSON.parse(savedUser);
                            setCurrentUser(parsedUser);
                            setView(parsedUser.role === 'siswa' ? 'siswa' : 'admin');
                        } else setView('login');

                    } catch (err) {
                        setErrorMsg("Gagal terhubung ke Cloud Database. Pastikan internet aktif dan URL GAS benar.");
                        setView('error');
                    }
                };

                if (GAS_URL && !GAS_URL.includes("PASTE_URL")) fetchAllData(GAS_URL);
                else { setErrorMsg("URL Google Apps Script belum disetel di kode HTML!"); setView('error'); }
            }, []);

            const handleLogin = (role, userData = null) => {
                const userObj = { role, ...userData };
                setCurrentUser(userObj);
                localStorage.setItem('tka_current_user', JSON.stringify(userObj));
                setView(role === 'siswa' ? 'siswa' : 'admin'); 
            };

            const handleLogout = () => {
                if(window.confirm('Apakah Anda yakin ingin keluar?')) {
                    localStorage.removeItem('tka_current_user');
                    setCurrentUser(null); setView('login'); setActiveExam(null);
                }
            };

            const executeApiAction = async (action, payload) => {
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST', body: JSON.stringify({ action, payload }), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    return await response.json();
                } catch (err) { return { status: 'error' }; }
            };

            if (view === 'loading') return <LoadingScreen />;
            if (view === 'error') return <ErrorScreen msg={errorMsg} retry={() => window.location.reload()} />;

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                    {view === 'login' && <LoginScreen onLogin={handleLogin} dbSiswa={dbSiswa} dbGuru={dbGuru} appConfig={appConfig} />}
                    {view === 'admin' && <DashboardPortal user={currentUser} onLogout={handleLogout} data={{dbSiswa, dbSoal, dbJadwal, dbHasil, dbGuru}} refreshData={() => window.location.reload()} apiCall={executeApiAction} setDbSoal={setDbSoal} setDbGuru={setDbGuru} setDbSiswa={setDbSiswa} setDbJadwal={setDbJadwal} appConfig={appConfig} setAppConfig={setAppConfig} />}
                    {view === 'siswa' && <StudentPortal user={currentUser} onLogout={handleLogout} dbJadwal={dbJadwal} dbHasil={dbHasil} appConfig={appConfig} onStartExam={(e) => {setActiveExam(e); setView('exam');}} />}
                    {view === 'exam' && (
                        <ExamEngine user={currentUser} examData={activeExam} dbSoal={dbSoal} dbGuru={dbGuru} appConfig={appConfig} onFinish={async (hasil) => { 
                                const res = await executeApiAction('saveHasil', hasil); 
                                if (res && res.status === 'success') {
                                    setDbHasil(p => [...p, hasil]); setActiveExam(null); setView('siswa'); 
                                    alert("Ujian Selesai! Skor Anda: " + hasil.Skor); return true; 
                                } else {
                                    alert("GAGAL MENYIMPAN NILAI KE SERVER!\nPastikan internet Anda stabil, lalu coba klik 'Kumpulkan' lagi.\n\nPesan Error: " + (res?.message || "Koneksi terputus"));
                                    return false; 
                                }
                            }} />
                    )}
                </div>
            );
        };

        const LoadingScreen = () => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center text-slate-600">
                <i className="fas fa-spinner fa-spin text-5xl text-red-600 mb-6"></i>
                <h2 className="text-xl font-bold">Menyinkronkan Database...</h2>
            </div>
        );
        
        const ErrorScreen = ({msg, retry}) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-4 border-red-500">
                    <i className="fas fa-server text-5xl text-red-500 mb-4 block"></i>
                    <h2 className="text-xl font-bold mb-2">Koneksi Gagal</h2>
                    <p className="text-slate-600 mb-6">{msg}</p>
                    <button onClick={retry} className="px-8 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">Coba Lagi / Refresh</button>
                </div>
            </div>
        );

        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div className={`${color} text-white w-12 h-12 flex items-center justify-center rounded-xl text-xl`}><i className={`fas ${icon}`}></i></div>
                <div><div className="text-slate-500 text-sm font-medium leading-tight">{title}</div><div className="text-2xl font-bold text-slate-800">{value}</div></div>
            </div>
        );

        const DataTable = ({ title, data, exportName }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const validData = Array.isArray(data) ? data.filter(r => r && typeof r === 'object' && Object.keys(r).length > 0) : [];

            if (validData.length === 0) return <div className="p-6 bg-white rounded-xl border text-slate-500 print-hidden">Tidak ada data di sistem.</div>;
            
            const headers = Object.keys(validData[0]);
            const filteredData = validData.filter(row => Object.values(row).some(val => val != null && String(val).toLowerCase().includes(searchTerm.toLowerCase())));

            const handleExportCSV = () => {
                if (filteredData.length === 0) return;
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...filteredData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(","))].join("\n");
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `Export_${exportName || title}.csv`); link.click();
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 print-hidden">
                        <h2 className="text-2xl font-bold text-slate-800 w-full md:w-auto">{title}</h2>
                        <div className="flex flex-col md:flex-row w-full md:w-auto gap-2">
                            <input type="text" placeholder="Cari data..." className="w-full md:w-64 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            <button onClick={handleExportCSV} className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2"><i className="fas fa-file-excel"></i> Export CSV</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto print:border-none print:shadow-none print:overflow-visible">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100 text-slate-600"><tr>{headers.map(h => <th key={h} className="p-4 border-b font-bold">{String(h).replace(/_/g, ' ')}</th>)}</tr></thead>
                            <tbody>
                                {filteredData.length > 0 ? filteredData.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50 border-b">{headers.map(h => <td key={h} className="p-4 max-w-[200px] truncate" title={row[h]}>{row[h]}</td>)}</tr>
                                )) : <tr><td colSpan={headers.length} className="p-6 text-center text-slate-500">Data tidak ditemukan.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const GantiPasswordModal = ({ onClose, onSubmit }) => {
            const [oldPwd, setOldPwd] = useState('');
            const [newPwd, setNewPwd] = useState('');
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                    <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-key text-red-600 mr-2"></i>Ganti Password</h3>
                        <form onSubmit={(e)=>{e.preventDefault(); onSubmit(oldPwd, newPwd);}} className="space-y-4">
                            <div><label className="text-sm font-bold block mb-1">Password Lama</label><input required type="password" value={oldPwd} onChange={e=>setOldPwd(e.target.value)} className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" /></div>
                            <div><label className="text-sm font-bold block mb-1">Password Baru</label><input required type="password" value={newPwd} onChange={e=>setNewPwd(e.target.value)} className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" /></div>
                            <div className="flex gap-2 pt-2">
                                <button type="button" onClick={onClose} className="w-1/3 bg-slate-200 text-slate-700 font-bold py-2 rounded hover:bg-slate-300">Batal</button>
                                <button type="submit" className="w-2/3 bg-red-600 text-white font-bold py-2 rounded hover:bg-red-700">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        /* ==========================================
           LOGIN SCREEN
           ========================================== */
        const LoginScreen = ({ onLogin, dbSiswa, dbGuru, appConfig }) => {
            const [nisn, setNisn] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const adminUsername = appConfig.adminUser || 'admin';
            const adminPassword = appConfig.adminPass || 'admin';

            const handleSubmit = (e) => {
                e.preventDefault(); setError('');
                if (nisn === adminUsername && password === adminPassword) {
                    return onLogin('admin', {Nama_Guru: 'Administrator', Kelas_Guru: 'Semua'});
                }
                const guru = (dbGuru || []).find(g => g && String(g.Username) === String(nisn) && String(g.Password) === String(password));
                if (guru) return onLogin('admin', { ...guru, role: 'guru' });
                const siswa = (dbSiswa || []).find(s => s && String(s.NISN) === String(nisn) && String(s.Password) === String(password));
                if (siswa) {
                    if(String(siswa.Status_Aktif).toLowerCase() === 'true') onLogin('siswa', siswa);
                    else setError('Akun Siswa dinonaktifkan oleh Admin.');
                } else setError('Username/NISN atau Password salah.');
            };

            const loginStyle = {
                backgroundColor: '#f8fafc',
                backgroundImage: appConfig.loginBackground ? `url(${getSafeImageUrl(appConfig.loginBackground)})` : 'linear-gradient(to bottom right, #dc2626, #7f1d1d)',
                backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat'
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4 relative" style={loginStyle}>
                    {appConfig.loginBackground && <div className="absolute inset-0 bg-black/40 z-0"></div>}
                    <div className="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 border border-slate-100">
                        <div className="flex flex-col items-center mb-6 text-center">
                            {appConfig.logo ? <img src={getSafeImageUrl(appConfig.logo)} alt="Logo Sekolah" className="h-24 mb-3 object-contain drop-shadow-md" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150x150?text=Logo'; }} /> : <div className="bg-red-50 p-4 rounded-full mb-3 text-red-700 text-3xl shadow-sm"><i className="fas fa-graduation-cap"></i></div>}
                            <h1 className="text-2xl font-black text-slate-900 drop-shadow-sm">{appConfig.namaUjian}</h1>
                            <p className="text-slate-900 text-sm font-bold mt-1 drop-shadow-sm">{appConfig.namaSekolah}</p>
                        </div>
                        {error && <div className="bg-red-100/90 text-red-600 p-3 rounded-lg mb-4 text-sm font-medium border border-red-200 shadow-sm"><i className="fas fa-exclamation-triangle mr-2"></i>{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold mb-1 text-slate-900 drop-shadow-sm">Username / NISN</label>
                                <input type="text" className="w-full px-4 py-2 border border-slate-200 bg-white focus:bg-white rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-slate-900 transition-colors placeholder-slate-400" value={nisn} onChange={(e) => setNisn(e.target.value)} required placeholder="Masukkan NISN atau Username" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-1 text-slate-900 drop-shadow-sm">Password</label>
                                <input type="password" className="w-full px-4 py-2 border border-slate-200 bg-white focus:bg-white rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-slate-900 transition-colors placeholder-slate-400" value={password} onChange={(e) => setPassword(e.target.value)} required placeholder="••••••••" />
                            </div>
                            <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-bold transition shadow-lg mt-2 border border-red-500/50">Masuk Portal</button>
                        </form>
                    </div>
                </div>
            );
        };

        /* ==========================================
           DASHBOARD PORTAL (ADMIN & GURU)
           ========================================== */
        const DashboardPortal = ({ user, onLogout, data, refreshData, apiCall, setDbSoal, setDbGuru, setDbSiswa, setDbJadwal, appConfig, setAppConfig }) => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showPwdModal, setShowPwdModal] = useState(false);
            
            const { dbSiswa, dbSoal, dbJadwal, dbHasil, dbGuru } = data;
            
            // ROLE-BASED ACCESS CONTROL (RBAC) LOGIC
            const isAdmin = user.role === 'admin' && user.Nama_Guru === 'Administrator';
            const targetAkses = String(user.Kelas_Guru || '').trim();
            const isGuruMapel = !isAdmin && MAPEL_LIST.includes(targetAkses);
            const isGuruKelas = !isAdmin && !isGuruMapel; 

            const availableClasses = (appConfig.daftarRombel || 'Kelas 1,Kelas 2,Kelas 3,Kelas 4,Kelas 5,Kelas 6').split(',').map(c => c.trim()).filter(Boolean).sort();

            let tabs = [
                { id: 'dashboard', label: 'Home', icon: 'fa-home' },
                { id: 'soal', label: 'Soal', icon: 'fa-file-lines' },
                { id: 'siswa', label: 'Siswa', icon: 'fa-users' },
                { id: 'hasil', label: 'Nilai', icon: 'fa-chart-bar' },
                { id: 'rekap', label: 'Rekap', icon: 'fa-table' }
            ];
            
            if (isAdmin) {
                tabs.splice(3, 0, { id: 'rombel', label: 'Rombel', icon: 'fa-layer-group' });
                tabs.push({ id: 'pengaturan', label: 'Sesi', icon: 'fa-clock' });
                tabs.push({ id: 'cetakkartu', label: 'Cetak', icon: 'fa-print' });
                tabs.push({ id: 'guru', label: 'Guru', icon: 'fa-chalkboard-teacher' });
            }

            // Dashboard Stats Filters
            const displayedSiswa = (isAdmin || isGuruMapel) ? dbSiswa : (dbSiswa || []).filter(s => s && s.Kelas === targetAkses);
            const mySoalCount = isAdmin ? dbSoal.length : (dbSoal || []).filter(s => s && s.Pembuat === user.Nama_Guru).length;
            
            const relevantHasil = (dbHasil || []).filter(h => {
                if (!h) return false;
                if (isAdmin) return true;
                if (isGuruMapel) return h.Mapel && String(h.Mapel).trim().toLowerCase().startsWith(targetAkses.toLowerCase());
                return displayedSiswa.some(s => s && String(s.NISN) === String(h.NISN)); // Guru Kelas
            });

            const validScores = relevantHasil.filter(h => h.Skor !== undefined && !isNaN(parseInt(h.Skor))).map(h => parseInt(h.Skor));
            const averageScore = validScores.length > 0 ? (validScores.reduce((a,b) => a+b, 0) / validScores.length).toFixed(1) : 0;

            const handleChangePassword = (oldPwd, newPwd) => {
                if(user.Password !== oldPwd) return alert("Password lama salah!");
                apiCall('changePasswordGuru', { Username: user.Username, NewPassword: newPwd });
                alert("Password berhasil diubah!");
                setShowPwdModal(false);
            };

            return (
                <div className="flex flex-col md:flex-row h-screen overflow-hidden bg-slate-50 print:block print:h-auto print:overflow-visible">
                    
                    {/* MOBILE TOP HEADER */}
                    <div className="md:hidden w-full bg-red-700 text-white p-4 flex justify-between items-center shrink-0 shadow-md z-20 print-hidden">
                        <div className="flex items-center gap-3">
                            {appConfig.logo ? (
                                <img src={getSafeImageUrl(appConfig.logo)} alt="Logo" className="h-9 w-9 object-contain bg-white rounded-full p-0.5 shadow-sm" onError={(e) => { e.target.style.display='none'; }} />
                            ) : (
                                <div className="bg-red-800 p-2 rounded-lg border border-red-600 flex items-center justify-center">
                                    <i className="fas fa-graduation-cap"></i>
                                </div>
                            )}
                            <div>
                                <div className="font-bold text-sm leading-tight">Portal {isAdmin ? 'Admin' : (isGuruMapel ? 'Guru Mapel' : 'Guru Kelas')}</div>
                                <div className="text-[10px] text-red-200 leading-tight">{user.Nama_Guru} {targetAkses ? `(${targetAkses})` : ''}</div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={refreshData} className="text-red-100 hover:text-white transition w-8 h-8 flex items-center justify-center bg-red-800 rounded-full"><i className="fas fa-sync-alt"></i></button>
                            {!isAdmin && <button onClick={() => setShowPwdModal(true)} className="text-red-100 hover:text-white transition w-8 h-8 flex items-center justify-center bg-red-800 rounded-full"><i className="fas fa-key"></i></button>}
                        </div>
                    </div>

                    <div className="flex flex-row flex-1 overflow-hidden w-full print:block print:h-auto print:overflow-visible">
                        {/* DESKTOP SIDEBAR */}
                        <div className="hidden md:flex w-64 bg-red-900 text-white flex-col shrink-0 print-hidden shadow-xl z-20 h-full">
                            <div className="p-5 border-b border-red-800">
                                <div className="flex items-center gap-3 mb-2">
                                    {appConfig.logo ? (
                                        <img src={getSafeImageUrl(appConfig.logo)} alt="Logo" className="h-8 w-8 object-contain bg-white rounded p-0.5" onError={(e) => { e.target.style.display='none'; }} />
                                    ) : (
                                        <div className="bg-red-700 p-2 rounded-lg border border-red-600">
                                            <i className="fas fa-chalkboard-teacher"></i>
                                        </div>
                                    )}
                                    <span className="font-bold text-lg truncate">Portal {isAdmin ? 'Admin' : 'Guru'}</span>
                                </div>
                                <div className="text-xs text-red-200 bg-red-950 px-2 py-1 rounded inline-block truncate max-w-full">
                                    {user.Nama_Guru} {targetAkses ? `(${targetAkses})` : ''}
                                </div>
                            </div>
                            <div className="flex-1 py-4 overflow-y-auto custom-scrollbar">
                                <ul className="space-y-1 px-3">
                                    {tabs.map(tab => (
                                        <li key={tab.id}>
                                            <button onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-colors ${activeTab === tab.id ? 'bg-red-700 text-white font-bold shadow-sm' : 'text-red-200 hover:bg-red-800 hover:text-white'}`}>
                                                <i className={`fas ${tab.icon} w-5`}></i> {tab.label}
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <div className="p-4 border-t border-red-800 space-y-2">
                                {!isAdmin && <button onClick={() => setShowPwdModal(true)} className="flex items-center justify-center gap-2 bg-red-800 hover:bg-red-700 w-full py-2 rounded-lg text-sm text-white transition"><i className="fas fa-key"></i> Ganti Password</button>}
                                <button onClick={refreshData} className="flex items-center justify-center gap-2 text-red-300 hover:text-white hover:bg-red-800 w-full py-2 rounded-lg text-sm transition"><i className="fas fa-sync-alt"></i> Refresh / Sync</button>
                                <button onClick={onLogout} className="flex items-center justify-center gap-2 text-red-300 hover:text-white hover:bg-red-800 w-full py-2 rounded-lg text-sm transition"><i className="fas fa-sign-out-alt"></i> Logout</button>
                            </div>
                        </div>

                        {/* MAIN CONTENT */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-20 md:pb-8 relative w-full h-full print:block print:overflow-visible print:h-auto print:p-0 print:m-0 print:bg-white">
                            {activeTab === 'dashboard' && (
                                <div className="print-hidden">
                                    <h2 className="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-slate-800">Dashboard Utama</h2>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8">
                                        <StatCard title="Siswa Anda" value={displayedSiswa.length} icon="fa-users" color="bg-red-600" />
                                        <StatCard title={isAdmin ? "Total Soal" : "Soal Anda"} value={mySoalCount} icon="fa-file-alt" color="bg-slate-600" />
                                        <StatCard title="Data Masuk" value={relevantHasil.length} icon="fa-check-circle" color="bg-red-500" />
                                        <StatCard title="Rata Nilai" value={averageScore} icon="fa-chart-line" color="bg-amber-500" />
                                    </div>
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="font-bold text-lg mb-2 text-slate-800">Selamat Datang, {user.Nama_Guru}!</h3>
                                        <p className="text-sm text-slate-600">Sistem membatasi akses secara otomatis. Sebagai <strong>{isAdmin ? 'Administrator' : (isGuruMapel ? 'Guru Bidang Studi' : 'Wali Kelas')} {targetAkses ? `(${targetAkses})` : ''}</strong>, Anda hanya akan melihat data siswa dan ujian yang berada dalam ruang lingkup kewenangan Anda.</p>
                                    </div>
                                </div>
                            )}
                            
                            {activeTab === 'soal' && <ManajemenSoal dbSoal={dbSoal} setDbSoal={setDbSoal} user={user} isAdmin={isAdmin} isGuruMapel={isGuruMapel} isGuruKelas={isGuruKelas} targetAkses={targetAkses} apiCall={apiCall} dbGuru={dbGuru} availableClasses={availableClasses} />}
                            {activeTab === 'siswa' && <DataPeserta data={dbSiswa} setDbSiswa={setDbSiswa} apiCall={apiCall} isAdmin={isAdmin} isGuruMapel={isGuruMapel} targetAkses={targetAkses} availableClasses={availableClasses} appConfig={appConfig} setAppConfig={setAppConfig} />}
                            {activeTab === 'hasil' && <HasilUjianHierarchy dbHasil={dbHasil} dbSiswa={dbSiswa} isAdmin={isAdmin} isGuruMapel={isGuruMapel} isGuruKelas={isGuruKelas} targetAkses={targetAkses} availableClasses={availableClasses} appConfig={appConfig} />}
                            {activeTab === 'rekap' && <RekapitulasiHasil dbHasil={dbHasil} dbSiswa={dbSiswa} isAdmin={isAdmin} isGuruMapel={isGuruMapel} isGuruKelas={isGuruKelas} targetAkses={targetAkses} availableClasses={availableClasses} appConfig={appConfig} dbGuru={dbGuru} />}
                            
                            {activeTab === 'rombel' && isAdmin && <ManajemenRombel dbSiswa={dbSiswa} setDbSiswa={setDbSiswa} apiCall={apiCall} availableClasses={availableClasses} appConfig={appConfig} setAppConfig={setAppConfig} />}
                            {activeTab === 'cetakkartu' && isAdmin && <CetakKartuAdmin dbSiswa={dbSiswa} appConfig={appConfig} availableClasses={availableClasses} />}
                            {activeTab === 'guru' && isAdmin && <ManajemenGuru dbGuru={dbGuru} setDbGuru={setDbGuru} apiCall={apiCall} availableClasses={availableClasses} />}
                            {activeTab === 'pengaturan' && isAdmin && <PengaturanSistem appConfig={appConfig} setAppConfig={setAppConfig} dbJadwal={dbJadwal} setDbJadwal={setDbJadwal} apiCall={apiCall} isAdmin={isAdmin} userKelas={targetAkses} availableClasses={availableClasses} />}
                            
                            {showPwdModal && <GantiPasswordModal onClose={() => setShowPwdModal(false)} onSubmit={handleChangePassword} />}
                        </div>
                    </div>

                    {/* MOBILE BOTTOM NAVIGATION */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex overflow-x-auto z-30 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] hide-scrollbar pb-safe print-hidden">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center min-w-[72px] flex-1 pt-3 pb-2 px-1 transition-colors relative ${activeTab === tab.id ? 'text-red-600' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}>
                                {activeTab === tab.id && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-1 bg-red-600 rounded-b-full"></div>}
                                <i className={`fas ${tab.icon} text-[20px] mb-1.5 ${activeTab === tab.id ? 'scale-110' : ''} transition-transform`}></i>
                                <span className="text-[10px] font-bold text-center leading-tight whitespace-nowrap overflow-hidden text-ellipsis w-full px-1">{tab.label}</span>
                            </button>
                        ))}
                        <button onClick={onLogout} className="flex flex-col items-center justify-center min-w-[72px] flex-1 pt-3 pb-2 px-1 transition-colors text-slate-400 hover:text-red-600 hover:bg-red-50">
                            <i className="fas fa-sign-out-alt text-[20px] mb-1.5"></i>
                            <span className="text-[10px] font-bold text-center leading-tight whitespace-nowrap overflow-hidden text-ellipsis w-full px-1">Keluar</span>
                        </button>
                    </div>
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN MANAJEMEN ROMBEL (ADMIN)
           ========================================== */
        const ManajemenRombel = ({ dbSiswa, setDbSiswa, apiCall, availableClasses, appConfig, setAppConfig }) => {
            const [localClasses, setLocalClasses] = useState(availableClasses);
            const [newClass, setNewClass] = useState('');
            const [sourceClass, setSourceClass] = useState('');
            const [targetClass, setTargetClass] = useState('');
            const [selectedSiswa, setSelectedSiswa] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);

            useEffect(() => {
                const merged = [...new Set([...availableClasses, ...localClasses])].sort();
                setLocalClasses(merged);
            }, [availableClasses]);

            const handleCreateRombel = (e) => {
                e.preventDefault();
                if(!newClass.trim()) return;
                const className = newClass.trim();
                
                if(!availableClasses.includes(className)) {
                    const newClasses = [...availableClasses, className].sort();
                    const newConfig = { ...appConfig, daftarRombel: newClasses.join(',') };
                    setAppConfig(newConfig);
                    apiCall('saveConfig', newConfig);
                    alert(`Rombel "${className}" berhasil dibuat! Silakan tarik siswa ke rombel ini di panel sebelah.`);
                } else alert("Nama Rombel sudah ada.");
                setNewClass('');
            };

            const handleDeleteRombel = (className) => {
                const isUsedBySiswa = (dbSiswa || []).some(s => s && s.Kelas === className);
                if (isUsedBySiswa) {
                    return alert(`Rombel "${className}" tidak bisa dihapus karena masih ada siswa di dalamnya. Pindahkan dulu siswanya ke kelas lain.`);
                }
                if(window.confirm(`Yakin ingin menghapus rombel "${className}" dari daftar kelas?`)) {
                    const newClasses = availableClasses.filter(c => c !== className);
                    const newConfig = { ...appConfig, daftarRombel: newClasses.join(',') };
                    setAppConfig(newConfig);
                    apiCall('saveConfig', newConfig);
                }
            };

            const studentsToShow = sourceClass ? dbSiswa.filter(s => s && s.Kelas === sourceClass) : dbSiswa;

            const handleTransfer = async () => {
                if(!targetClass) return alert("Pilih rombel tujuan terlebih dahulu!");
                if(selectedSiswa.length === 0) return alert("Pilih minimal 1 siswa yang akan dipindahkan!");
                if(!window.confirm(`Pindahkan ${selectedSiswa.length} siswa ke rombel "${targetClass}"?`)) return;

                setIsProcessing(true);
                const updatedDbSiswa = dbSiswa.map(s => {
                    if(s && selectedSiswa.includes(s.NISN)) return { ...s, Kelas: targetClass };
                    return s;
                });
                setDbSiswa(updatedDbSiswa);

                const toUpdate = updatedDbSiswa.filter(s => s && selectedSiswa.includes(s.NISN));
                for(let i=0; i<toUpdate.length; i++){
                    await apiCall('editSiswa', toUpdate[i]);
                }

                alert("Siswa berhasil dipindahkan secara permanen!");
                setSelectedSiswa([]);
                setIsProcessing(false);
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row justify-between items-center mb-4 md:mb-6 gap-4 print-hidden">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800"><i className="fas fa-layer-group text-red-600 mr-2"></i>Manajemen Rombel</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                            <h3 className="font-bold text-lg mb-4 border-b pb-2">Buat Rombel Baru</h3>
                            <form onSubmit={handleCreateRombel} className="space-y-4">
                                <div>
                                    <label className="text-sm font-bold block mb-1">Nama Rombel / Kelas</label>
                                    <input required type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500" value={newClass} onChange={(e) => setNewClass(e.target.value)} placeholder="Misal: Kelas 1 A" />
                                </div>
                                <button type="submit" className="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700 transition">Tambah Rombel</button>
                            </form>
                            
                            <div className="mt-6">
                                <h4 className="font-bold text-sm text-slate-500 mb-3 uppercase">Daftar Rombel Tersedia</h4>
                                <div className="flex flex-wrap gap-2 max-h-48 overflow-y-auto custom-scrollbar">
                                    {localClasses.map(c => (
                                        <div key={c} className="bg-slate-100 border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2">
                                            <span>{c}</span>
                                            <button onClick={() => handleDeleteRombel(c)} className="text-red-400 hover:text-red-700 transition" title="Hapus Rombel">
                                                <i className="fas fa-times"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="font-bold text-lg mb-4 border-b pb-2">Tarik Siswa ke Rombel</h3>
                            
                            <div className="flex flex-col md:flex-row gap-4 mb-6">
                                <div className="flex-1">
                                    <label className="text-sm font-bold block mb-1 text-slate-500">Saring Dari Kelas</label>
                                    <select className="w-full border p-2 rounded bg-slate-50 outline-none focus:ring-2 focus:ring-amber-500" value={sourceClass} onChange={e => {setSourceClass(e.target.value); setSelectedSiswa([]);}}>
                                        <option value="">-- Semua Siswa --</option>
                                        {localClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center justify-center pt-5 hidden md:flex"><i className="fas fa-arrow-right text-slate-300 text-xl"></i></div>
                                <div className="flex-1">
                                    <label className="text-sm font-bold block mb-1 text-red-600">Pindahkan Ke Rombel Tujuan</label>
                                    <select className="w-full border-2 border-red-200 p-2 rounded outline-none focus:border-red-500 font-bold" value={targetClass} onChange={e => setTargetClass(e.target.value)}>
                                        <option value="">-- Pilih Rombel Tujuan --</option>
                                        {localClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="border rounded-lg overflow-hidden flex flex-col h-[400px]">
                                <div className="overflow-y-auto flex-1 custom-scrollbar">
                                    <table className="w-full text-left text-sm whitespace-nowrap select-none">
                                        <thead className="bg-slate-100 text-slate-600 sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="p-3 border-b text-center w-12">
                                                    <input type="checkbox" className="w-4 h-4 accent-red-600 cursor-pointer" checked={studentsToShow.length > 0 && selectedSiswa.length === studentsToShow.length} onChange={() => {
                                                        if(selectedSiswa.length === studentsToShow.length) setSelectedSiswa([]);
                                                        else setSelectedSiswa(studentsToShow.map(s => s.NISN));
                                                    }} />
                                                </th>
                                                <th className="p-3 border-b font-bold">NISN</th><th className="p-3 border-b font-bold">Nama Siswa</th><th className="p-3 border-b font-bold">Kelas Saat Ini</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {studentsToShow.map((siswa, i) => (
                                                <tr key={i} className="hover:bg-slate-50 border-b cursor-pointer" onClick={() => {
                                                    setSelectedSiswa(prev => prev.includes(siswa.NISN) ? prev.filter(n => n !== siswa.NISN) : [...prev, siswa.NISN]);
                                                }}>
                                                    <td className="p-3 text-center"><input type="checkbox" className="w-4 h-4 accent-red-600 pointer-events-none" checked={selectedSiswa.includes(siswa.NISN)} readOnly /></td>
                                                    <td className="p-3 font-mono text-slate-600">{siswa.NISN}</td>
                                                    <td className="p-3 font-bold">{siswa.Nama}</td>
                                                    <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs font-bold ${siswa.Kelas === targetClass ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>{siswa.Kelas || 'Belum Ada'}</span></td>
                                                </tr>
                                            ))}
                                            {studentsToShow.length === 0 && <tr><td colSpan="4" className="p-6 text-center text-slate-500">Tidak ada siswa ditemukan.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="bg-slate-50 p-4 border-t flex justify-between items-center">
                                    <span className="font-bold text-slate-600">{selectedSiswa.length} Siswa Terpilih</span>
                                    <button disabled={isProcessing || selectedSiswa.length === 0 || !targetClass} onClick={handleTransfer} className="bg-red-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-red-700 transition disabled:opacity-50 flex items-center gap-2">
                                        {isProcessing ? <><i className="fas fa-spinner fa-spin"></i> Memproses...</> : <><i className="fas fa-exchange-alt"></i> Pindahkan Siswa</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN PENGATURAN SISTEM
           ========================================== */
        const PengaturanSistem = ({ appConfig, setAppConfig, dbJadwal, setDbJadwal, apiCall, isAdmin, userKelas, availableClasses }) => {
            const [namaSekolah, setNamaSekolah] = useState(appConfig.namaSekolah || '');
            const [namaUjian, setNamaUjian] = useState(appConfig.namaUjian || '');
            const [logoBase64, setLogoBase64] = useState(appConfig.logo || '');
            const [loginBgBase64, setLoginBgBase64] = useState(appConfig.loginBackground || '');
            const [adminUser, setAdminUser] = useState(appConfig.adminUser || 'admin');
            const [adminPass, setAdminPass] = useState(appConfig.adminPass || 'admin');
            const [isUploading, setIsUploading] = useState(false);

            const [jadwalForm, setJadwalForm] = useState({ ID_Tes: '', Mapel: '', Kelas: '', Tanggal: '', Waktu: '', Zona_Waktu: 'WITA', Durasi: 120, Token: '', Status: 'Aktif' });
            const [isEditingJadwal, setIsEditingJadwal] = useState(false);

            const handleSaveIdentitas = (e) => {
                e.preventDefault();
                const newConf = { ...appConfig, namaSekolah, namaUjian, logo: logoBase64, loginBackground: loginBgBase64, adminUser, adminPass };
                setAppConfig(newConf);
                apiCall('saveConfig', newConf);
                alert("Identitas, Latar Belakang & Akses Admin berhasil disimpan permanen di Cloud!");
            };

            const handleImageUploadToDrive = async (file, maxWidth, callback) => {
                setIsUploading(true);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        
                        const base64Str = canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.8);
                        
                        const payload = {
                            filename: `Asset_${Date.now()}.${file.type.split('/')[1] || 'jpg'}`,
                            mimeType: file.type,
                            base64: base64Str
                        };
                        
                        try {
                            const res = await apiCall('uploadImage', payload);
                            if(res && res.status === 'success') {
                                callback(res.url);
                                alert("Gambar berhasil di-upload ke Cloud Drive!");
                            } else alert("Gagal mengupload gambar ke Drive. Pastikan Deploy Code.gs sudah diperbarui!");
                        } catch(e) { alert("Error saat mengupload ke Cloud."); }
                        
                        setIsUploading(false);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleAddJadwal = (e) => {
                e.preventDefault();
                const finalMapel = `${jadwalForm.Mapel} - ${jadwalForm.Kelas}`;
                const finalWaktu = `${jadwalForm.Tanggal} ${jadwalForm.Waktu} ${jadwalForm.Zona_Waktu}`;
                const newJadwal = { 
                    ID_Tes: jadwalForm.ID_Tes, Mapel: finalMapel, Waktu_Mulai: finalWaktu, Durasi: jadwalForm.Durasi, Token: jadwalForm.Token, Status: jadwalForm.Status 
                };
                
                if (isEditingJadwal) {
                    setDbJadwal(prev => prev.map(j => j.ID_Tes === newJadwal.ID_Tes ? newJadwal : j));
                    apiCall('editJadwal', newJadwal);
                    alert("Sesi Ujian berhasil diperbarui!");
                } else {
                    setDbJadwal(prev => [...prev, newJadwal]);
                    apiCall('addJadwal', newJadwal);
                    alert("Jadwal/Token baru berhasil dibuat!");
                }
                setJadwalForm({ ID_Tes: '', Mapel: '', Kelas: '', Tanggal: '', Waktu: '', Zona_Waktu: 'WITA', Durasi: 120, Token: '', Status: 'Aktif' });
                setIsEditingJadwal(false);
            };

            const handleEditJadwalClick = (j) => {
                const mapelParts = j.Mapel ? String(j.Mapel).split(' - ') : ['',''];
                const waktuParts = j.Waktu_Mulai ? String(j.Waktu_Mulai).split(' ') : ['','','WITA'];
                setJadwalForm({ 
                    ID_Tes: j.ID_Tes || '', Mapel: mapelParts[0] || '', Kelas: mapelParts[1] || '', Tanggal: waktuParts[0] || '', Waktu: waktuParts[1] || '', Zona_Waktu: waktuParts[2] || 'WITA', Durasi: j.Durasi || 120, Token: j.Token || '', Status: j.Status || 'Aktif' 
                });
                setIsEditingJadwal(true);
            };

            const handleDeleteJadwal = (idTes) => {
                if(window.confirm(`Yakin ingin menghapus sesi ujian "${idTes}" secara permanen?`)) {
                    setDbJadwal(prev => prev.filter(j => j.ID_Tes !== idTes));
                    apiCall('deleteJadwal', { ID_Tes: idTes });
                    alert("Sesi Ujian berhasil dihapus!");
                }
            };

            return (
                <div className="space-y-8">
                    {isAdmin && (
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print-hidden">

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Nama Sekolah</label>
                                        <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={namaSekolah || ''} onChange={e=>setNamaSekolah(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Judul / Nama Ujian</label>
                                        <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={namaUjian || ''} onChange={e=>setNamaUjian(e.target.value)} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Logo Sekolah</label>
                                        <input type="file" accept="image/*" onChange={e => { if(e.target.files[0]) handleImageUploadToDrive(e.target.files[0], 300, setLogoBase64); }} className="w-full text-sm border-0 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
                                        {logoBase64 && <img src={getSafeImageUrl(logoBase64)} className="mt-3 h-16 object-contain border p-1 rounded" onError={(e) => { e.target.style.display='none'; }} />}
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">Background Login</label>
                                        <input type="file" accept="image/*" onChange={e => { if(e.target.files[0]) handleImageUploadToDrive(e.target.files[0], 1280, setLoginBgBase64); }} className="w-full text-sm border-0 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
                                        {loginBgBase64 && <img src={getSafeImageUrl(loginBgBase64)} className="mt-3 h-20 w-full object-cover border p-1 rounded" onError={(e) => { e.target.style.display='none'; }} />}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t mt-4 border-slate-200">
                                    <div>
                                        <label className="block text-sm font-bold mb-1 text-slate-700">Username Login Admin</label>
                                        <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={adminUser} onChange={e=>setAdminUser(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1 text-slate-700">Password Admin</label>
                                        <input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={adminPass} onChange={e=>setAdminPass(e.target.value)} />
                                    </div>
                                </div>
                                <button disabled={isUploading} type="submit" className="bg-red-600 text-white font-bold px-6 py-2.5 rounded-lg shadow hover:bg-red-700 transition mt-2 disabled:opacity-50">
                                    {isUploading ? 'Sedang Mengupload...' : 'Simpan Pengaturan'}
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print-hidden">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-clock text-amber-500 mr-2"></i>Pengaturan Waktu Ujian & Token</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h4 className="font-bold text-sm text-slate-500 mb-3 uppercase">{isEditingJadwal ? 'Edit Sesi Ujian' : 'Buat Sesi Ujian Baru'}</h4>
                                <form onSubmit={handleAddJadwal} className="space-y-3">
                                    <div>
                                        <label className="text-sm font-bold">Sesi Ujian</label>
                                        <select required disabled={isEditingJadwal} className="w-full border p-2 rounded bg-white focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.ID_Tes || ''} onChange={e=>setJadwalForm({...jadwalForm, ID_Tes: e.target.value})}>
                                            <option value="">-- Pilih Sesi --</option>
                                            {SESI_LIST.map(sesi => <option key={sesi} value={sesi}>{sesi}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-sm font-bold">Mata Pelajaran</label>
                                            <select required className="w-full border p-2 rounded bg-white focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Mapel || ''} onChange={e=>setJadwalForm({...jadwalForm, Mapel: e.target.value})}>
                                                <option value="">-- Pilih Mapel --</option>
                                                {MAPEL_LIST.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Kelas Tujuan</label>
                                            <select required className="w-full border p-2 rounded bg-white focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Kelas || ''} onChange={e=>setJadwalForm({...jadwalForm, Kelas: e.target.value})}>
                                                <option value="">-- Pilih Kelas --</option>
                                                {availableClasses.map(k => <option key={k} value={k}>{k}</option>)}

                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                        <div>

                                            <input required type="date" className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Tanggal || ''} onChange={e=>setJadwalForm({...jadwalForm, Tanggal: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Jam Mulai</label>
                                            <input required type="time" className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Waktu || ''} onChange={e=>setJadwalForm({...jadwalForm, Waktu: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Zona</label>
                                            <select className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Zona_Waktu || 'WITA'} onChange={e=>setJadwalForm({...jadwalForm, Zona_Waktu: e.target.value})}>
                                                <option value="WIB">WIB</option><option value="WITA">WITA</option><option value="WIT">WIT</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                        <div>
                                            <label className="text-sm font-bold">Durasi (Menit)</label>
                                            <input required type="number" className="w-full border p-2 rounded focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Durasi || ''} onChange={e=>setJadwalForm({...jadwalForm, Durasi: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Token</label>
                                            <input required type="text" className="w-full border p-2 rounded font-mono uppercase focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Token || ''} onChange={e=>setJadwalForm({...jadwalForm, Token: e.target.value.toUpperCase()})} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold">Status Ujian</label>
                                            <select className="w-full border p-2 rounded bg-white focus:ring-2 focus:ring-amber-500 outline-none" value={jadwalForm.Status || 'Aktif'} onChange={e=>setJadwalForm({...jadwalForm, Status: e.target.value})}>
                                                <option value="Aktif">Aktif</option><option value="Selesai">Selesai</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        {isEditingJadwal && (
                                            <button type="button" onClick={() => { setIsEditingJadwal(false); setJadwalForm({ ID_Tes: '', Mapel: '', Kelas: '', Tanggal: '', Waktu: '', Zona_Waktu: 'WITA', Durasi: 120, Token: '', Status: 'Aktif' }); }} className="w-1/3 bg-slate-200 font-bold py-2 rounded">Batal</button>
                                        )}
                                        <button type="submit" className={`${isEditingJadwal ? 'w-2/3' : 'w-full'} bg-amber-500 text-white font-bold py-2.5 rounded-lg shadow hover:bg-amber-600 transition`}>
                                            {isEditingJadwal ? 'Perbarui Sesi' : 'Buat Sesi Ujian'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                            <div>
                                <h4 className="font-bold text-sm text-slate-500 mb-3 uppercase">Daftar Sesi ({isAdmin ? "Semua Kelas" : "Kelas Anda"})</h4>
                                <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                    {(dbJadwal || []).filter(j => j && j.ID_Tes).map((j, i) => (
                                        <div key={i} className="border p-3 rounded-lg bg-slate-50 flex justify-between items-center hover:border-amber-200 transition">
                                            <div>
                                                <div className="font-bold text-red-700">{j.Mapel}</div>
                                                <div className="text-xs text-slate-500 mb-1">{j.ID_Tes} • {j.Waktu_Mulai} • {j.Durasi} Menit</div>
                                                <span className="text-xs font-mono font-bold border px-1 rounded mr-2 bg-white">Token: {j.Token}</span>
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${j.Status === 'Aktif' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{j.Status}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEditJadwalClick(j)} className="text-amber-600 bg-amber-100 hover:bg-amber-200 p-2 rounded transition" title="Edit Sesi"><i className="fas fa-edit"></i></button>
                                                {isAdmin && (
                                                    <button onClick={() => handleDeleteJadwal(j.ID_Tes)} className="text-red-600 bg-red-100 hover:bg-red-200 p-2 rounded transition" title="Hapus Permanen"><i className="fas fa-trash"></i></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {(!dbJadwal || dbJadwal.length === 0) && <p className="text-sm text-slate-400">Belum ada sesi ujian.</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN CETAK KARTU (HANYA ADMIN)
           ========================================== */
        const CetakKartuAdmin = ({ dbSiswa, appConfig, availableClasses }) => {
            const [kelasCetak, setKelasCetak] = useState('');
            const [isPrintingMassal, setIsPrintingMassal] = useState(false);

            const siswaKelas = (dbSiswa || []).filter(s => s && s.Kelas === kelasCetak);

            return (
                <div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print-hidden">
                        <h3 className="text-xl font-bold mb-4 border-b pb-2"><i className="fas fa-print text-red-500 mr-2"></i>Cetak Kartu Ujian Massal</h3>
                        <p className="text-sm text-slate-500 mb-6">Pilih kelas yang ingin dicetak. Sistem akan memformat ukuran kartu secara otomatis menjadi 10 kartu per halaman A4.</p>
                        
                        <div className="flex flex-col md:flex-row gap-4 md:items-end max-w-md">
                            <div className="flex-1">
                                <label className="block text-sm font-bold mb-1">Pilih Kelas</label>
                                <select className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={kelasCetak || ''} onChange={(e) => setKelasCetak(e.target.value)}>
                                    <option value="">-- Pilih Kelas --</option>
                                    {availableClasses.map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>
                            <button disabled={!kelasCetak || siswaKelas.length === 0} onClick={() => setIsPrintingMassal(true)} className="bg-red-600 text-white font-bold px-6 py-2.5 rounded-lg shadow hover:bg-red-700 transition disabled:opacity-50 disabled:shadow-none w-full md:w-auto">
                                Cetak Kartu
                            </button>
                        </div>
                        {kelasCetak && <p className="text-sm text-slate-500 mt-3 font-medium">Ditemukan {siswaKelas.length} siswa di {kelasCetak}.</p>}
                    </div>

                    {/* PRINT OVERLAY MASSAL */}
                    {isPrintingMassal && (
                        <div className="fixed inset-0 z-50 bg-white overflow-y-auto print:static print:overflow-visible print:h-auto print:block">
                            <div className="p-4 bg-slate-800 text-white flex justify-between items-center sticky top-0 z-10 shadow-md print-hidden">
                                <div className="font-bold">Pratinjau Cetak Massal - {kelasCetak} ({siswaKelas.length} Kartu)</div>
                                <div className="flex gap-3">
                                    <button onClick={() => setIsPrintingMassal(false)} className="bg-slate-600 px-4 py-1.5 rounded font-bold hover:bg-slate-500 transition">Batal</button>
                                    <button onClick={() => window.print()} className="bg-red-600 px-4 py-1.5 rounded font-bold hover:bg-red-500 transition shadow"><i className="fas fa-print mr-2"></i> Print Sekarang</button>
                                </div>
                            </div>
                            <div className="p-4 md:p-8 print-card-container print:p-0">
                                {siswaKelas.map((siswa, idx) => (
                                    <div key={idx} className="print-card shadow-md">
                                        <div className="flex items-center justify-center gap-2 mb-3 border-b border-black pb-1.5">
                                            {appConfig.logo && <img src={getSafeImageUrl(appConfig.logo)} className="print-logo h-8 object-contain" />}
                                            <div className="text-center">
                                                <h2 className="print-title text-sm font-black uppercase text-black">{appConfig.namaUjian}</h2>
                                                <p className="print-subtitle text-[9px] font-bold uppercase text-black">{appConfig.namaSekolah}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-2 items-center">
                                            <div className="flex-1 space-y-1">
                                                <div><span className="block print-text-tiny uppercase font-bold text-slate-500">Nama</span><span className="print-text-small font-black leading-tight block text-black">{siswa.Nama}</span></div>
                                                <div><span className="block print-text-tiny uppercase font-bold text-slate-500">NISN / Username</span><span className="print-text-small font-mono font-bold text-black">{siswa.NISN}</span></div>
                                                <div><span className="block print-text-tiny uppercase font-bold text-slate-500">Password</span><span className="print-text-small font-mono font-bold border border-black px-1 rounded inline-block text-black">{siswa.Password}</span></div>
                                                <div><span className="block print-text-tiny uppercase font-bold text-slate-500">Kelas</span><span className="print-text-small font-bold text-black">{siswa.Kelas} - {siswa.Grup}</span></div>
                                            </div>
                                            <div className="print-qr shrink-0 border border-black p-0.5 rounded">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=LOGIN:${siswa.NISN}-${siswa.Password}`} className="w-full h-full" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN MANAJEMEN AKUN GURU
           ========================================== */
        const ManajemenGuru = ({ dbGuru, setDbGuru, apiCall, availableClasses }) => {
            const [form, setForm] = useState({ Username: '', Nama_Guru: '', Password: '', Kelas_Guru: '' });
            
            const handleSubmit = (e) => {
                e.preventDefault();
                setDbGuru(prev => [...prev, form]);
                apiCall('addGuru', form);
                alert("Akun Guru berhasil ditambahkan!");
                setForm({ Username: '', Nama_Guru: '', Password: '', Kelas_Guru: '' });
            };

            return (
                <div className="grid md:grid-cols-3 gap-6 print-hidden">
                    <div className="md:col-span-2">
                        <DataTable title="Daftar Akun Guru Kelas" data={dbGuru} exportName="Akun_Guru" />
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 self-start">
                        <h3 className="font-bold text-lg mb-4 border-b pb-2">Tambah Guru Baru</h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div><label className="text-sm font-bold block mb-1">Username Login</label><input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={form.Username} onChange={(e) => setForm({...form, Username: e.target.value})} placeholder="guru_kelas6" /></div>
                            <div><label className="text-sm font-bold block mb-1">Nama Lengkap & Title</label><input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={form.Nama_Guru} onChange={(e) => setForm({...form, Nama_Guru: e.target.value})} placeholder="Bpk. Andi (Wali Kelas 6)" /></div>
                            <div><label className="text-sm font-bold block mb-1">Password</label><input required type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none" value={form.Password} onChange={(e) => setForm({...form, Password: e.target.value})} placeholder="pass123"/></div>
                            <div>
                                <label className="text-sm font-bold block mb-1">Pilih Hak Akses (Wajib)</label>
                                <select required className="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none bg-white" value={form.Kelas_Guru} onChange={(e) => setForm({...form, Kelas_Guru: e.target.value})}>
                                    <option value="">-- Pilih Hak Akses --</option>
                                    <optgroup label="Wali Kelas (Guru Kelas)">
                                        {availableClasses.map(num => <option key={num} value={num}>{num}</option>)}
                                    </optgroup>
                                    <optgroup label="Guru Bidang Studi (Mapel)">
                                        {MAPEL_LIST.map(m => <option key={m} value={m}>Guru {m}</option>)}
                                    </optgroup>
                                </select>
