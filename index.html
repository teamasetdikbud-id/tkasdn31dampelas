                                        <button onClick={()=>window.print()} className="flex-1 bg-red-600 text-white rounded-lg font-bold"><i className="fas fa-print"></i> Cetak Berita Acara</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ==========================================
           STUDENT PORTAL
           ========================================== */
        const StudentPortal = ({ user, onLogout, dbJadwal, dbHasil, appConfig, onStartExam }) => {
            const [tokenInput, setTokenInput] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);
            const [now, setNow] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const handleVerifyToken = () => {
                if (String(tokenInput).trim().toUpperCase() === String(selectedExam.Token).trim().toUpperCase()) { 
                    onStartExam(selectedExam); 
                } else { 
                    alert('Token Salah! Periksa kembali ketikan Anda.'); 
                }
            };
            
            const riwayatPeserta = (dbHasil || []).filter(h => h && String(h.NISN) === String(user?.NISN));
            
            const availableExams = (dbJadwal || []).filter(j => {
                if (!j || !j.Mapel) return false;
                const parts = String(j.Mapel).split(' - ');
                if (parts.length < 2) return false;
                const jadwalKelas = parts[1].trim().toLowerCase();
                const userKelas = String(user?.Kelas || '').trim().toLowerCase();
                return jadwalKelas === userKelas;
            });

            // Mengecek apakah jam dimulainya sudah terlewati (>=)
            const isExamTimePassed = (waktuStr) => {
                if (!waktuStr) return true;
                try {
                    const parts = waktuStr.split(' ');
                    if (parts.length >= 2) {
                        const examTime = new Date(`${parts[0]}T${parts[1]}:00`);
                        return now >= examTime;
                    }
                    return true;
                } catch(e) { return true; }
            };

            // Mengecek apakah jam berakhirnya ujian (Mulai + Durasi) sudah terlewati
            const isExamTimeEnded = (waktuStr, durasiMenit) => {
                if (!waktuStr) return false;
                try {
                    const parts = waktuStr.split(' ');
                    if (parts.length >= 2) {
                        const examTime = new Date(`${parts[0]}T${parts[1]}:00`);
                        const durationMs = (parseInt(durasiMenit) || 0) * 60000;
                        const endTime = new Date(examTime.getTime() + durationMs);
                        return now > endTime;
                    }
                    return false;
                } catch(e) { return false; }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-10">
                        <h1 className="font-bold text-lg text-red-700 flex items-center">
                            {appConfig.logo ? <img src={getSafeImageUrl(appConfig.logo)} className="h-8 mr-2 object-contain" onError={(e) => { e.target.style.display='none'; }} /> : <i className="fas fa-book-open mr-2"></i>}
                            {appConfig.namaUjian}
                        </h1>
                        <div className="flex items-center gap-4">
                            <div className="text-sm text-right font-bold">{user.Nama} <span className="block text-xs font-normal text-slate-500">{user.Kelas}</span></div>
                            <button onClick={onLogout} className="text-slate-400 text-xl hover:text-red-700 transition" title="Logout"><i className="fas fa-sign-out-alt"></i></button>
                        </div>
                    </header>
                    <main className="p-6 md:p-10 max-w-4xl mx-auto w-full">
                        <h2 className="text-xl md:text-2xl font-bold mb-6">Ujian Tersedia</h2>
                        <div className="grid md:grid-cols-2 gap-6 mb-10">
                            {availableExams.map((jadwal) => {
                                const isAktif = String(jadwal.Status).toLowerCase() === 'aktif';
                                const isTimePassed = isExamTimePassed(jadwal.Waktu_Mulai);
                                const isTimeEnded = isExamTimeEnded(jadwal.Waktu_Mulai, jadwal.Durasi);
                                
                                return (
                                    <div key={jadwal.ID_Tes} className="bg-white rounded-xl shadow-sm border p-6 flex flex-col hover:border-red-200 transition">
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`px-2 py-1 text-xs font-bold rounded ${isAktif && !isTimeEnded ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
                                                {isTimeEnded ? 'Selesai' : jadwal.Status}
                                            </span>
                                            <span className="text-slate-400 text-sm"><i className="far fa-clock"></i> {jadwal.Durasi} Menit</span>
                                        </div>
                                        <h3 className="font-bold text-lg text-slate-800">{jadwal.Mapel ? String(jadwal.Mapel).split(' - ')[0] : 'Ujian'}</h3>
                                        <p className="text-sm text-slate-500 mb-4">{jadwal.Waktu_Mulai}</p>
                                        
                                        {isAktif && !isTimeEnded ? (
                                            isTimePassed ? (
                                                selectedExam?.ID_Tes === jadwal.ID_Tes ? (
                                                    <div className="flex gap-2 mt-auto">
                                                        <input type="text" className="flex-1 border border-red-300 px-2 rounded uppercase font-bold text-center tracking-widest outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500" value={tokenInput} onChange={(e) => setTokenInput(e.target.value.toUpperCase())} placeholder="TOKEN" />
                                                        <button onClick={handleVerifyToken} className="bg-red-600 text-white px-4 py-2 font-bold rounded hover:bg-red-700">Mulai</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={()=>{setSelectedExam(jadwal); setTokenInput('');}} className="w-full bg-red-50 text-red-600 py-2 rounded font-bold mt-auto hover:bg-red-100 border border-red-100">Masuk Sesi</button>
                                                )
                                            ) : (
                                                <button disabled className="w-full bg-slate-100 text-slate-400 py-2 rounded font-bold mt-auto flex items-center justify-center gap-2">
                                                    <i className="fas fa-lock"></i> Belum Waktunya
                                                </button>
                                            )
                                        ) : (
                                            <button disabled className="w-full bg-slate-100 text-slate-400 py-2 rounded font-bold mt-auto flex items-center justify-center gap-2">
                                                {isTimeEnded ? "Waktu Habis" : "Sesi Ditutup"}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                            {availableExams.length === 0 && <div className="col-span-2 text-center text-slate-500 bg-slate-100 p-6 rounded-lg">Belum ada ujian untuk kelas Anda.</div>}
                        </div>
                        
                        <h2 className="text-xl md:text-2xl font-bold mb-6 border-t pt-8">Riwayat Nilai Anda</h2>
                        <div className="bg-white rounded-xl shadow-sm border overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600"><tr><th className="p-4 border-b">Tanggal Selesai</th><th className="p-4 border-b">Mata Pelajaran</th><th className="p-4 border-b text-center">Skor Akhir</th></tr></thead>
                                <tbody>
                                    {riwayatPeserta.map((h, i) => (
                                        <tr key={i} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 text-slate-500">{h.Timestamp}</td><td className="p-4 font-bold">{h.Mapel ? String(h.Mapel).split(' - ')[0] : ''}</td><td className="p-4 text-center font-bold text-lg text-red-600">{h.Skor}</td>
                                        </tr>
                                    ))}
                                    {riwayatPeserta.length === 0 && (<tr><td colSpan="3" className="p-6 text-center text-slate-500">Belum ada ujian yang dikerjakan.</td></tr>)}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        };

        // --- EXAM ENGINE ---
        const ExamEngine = ({ user, examData, dbSoal, dbGuru, appConfig, onFinish }) => {
            
            // KEY UNIK UNTUK MENYIMPAN PROGRESS KE MEMORI BROWSER
            const progressKey = `tka_progress_${user?.NISN}_${examData?.ID_Tes}`;

            const [currentNumber, setCurrentNumber] = useState(0);
            
            // Inisialisasi Jawaban & Keraguan dari Local Storage jika pernah tersimpan
            const [answers, setAnswers] = useState(() => {
                const saved = localStorage.getItem(progressKey);
                if (saved) {
                    try { return JSON.parse(saved).answers || {}; } catch(e) {}
                }
                return {};
            });
            
            const [doubtful, setDoubtful] = useState(() => {
                const saved = localStorage.getItem(progressKey);
                if (saved) {
                    try { return JSON.parse(saved).doubtful || {}; } catch(e) {}
                }
                return {};
            });

            const [showSummary, setShowSummary] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const submitAttempted = useRef(false);

            // Simpan progress setiap kali jawaban atau "ragu-ragu" berubah
            useEffect(() => {
                localStorage.setItem(progressKey, JSON.stringify({ answers, doubtful }));
            }, [answers, doubtful, progressKey]);
            
            // Kalkulasi Timer Absolut Berdasarkan Jadwal Asli Server
            const calculateRemainingTime = () => {
                try {
                    const parts = examData.Waktu_Mulai.split(' ');
                    const examTime = new Date(`${parts[0]}T${parts[1]}:00`);
                    const durationMs = (parseInt(examData.Durasi) || 0) * 60000;
                    const endTime = new Date(examTime.getTime() + durationMs);
                    const now = new Date();
                    const diff = Math.floor((endTime - now) / 1000);
                    return diff > 0 ? diff : 0;
                } catch(e) {
                    return parseInt(examData?.Durasi) * 60 || 0; // Fallback jika format salah
                }
            };
            
            const [timeLeft, setTimeLeft] = useState(calculateRemainingTime());

            const isImageUrl = (val) => {
                if (!val) return false;
                const str = String(val).trim();
                return str.startsWith('http') || str.startsWith('data:image');
            };

            const mapelUtama = examData && examData.Mapel ? String(examData.Mapel).split(' - ')[0].trim() : '';
            const userKelasSafe = String(user?.Kelas || '').trim().toLowerCase();

            const getKelasOfSoal = (soal) => {
                if(!soal || !soal.Pembuat) return 'Semua';
                const pembuatStr = String(soal.Pembuat).trim();
                if(pembuatStr.startsWith('Administrator (')) {
                    return pembuatStr.replace('Administrator (', '').replace(')', '').trim();
                }
                const guru = (dbGuru || []).find(g => g && String(g.Nama_Guru).trim() === pembuatStr);
                return guru ? String(guru.Kelas_Guru).trim() : 'Semua';
            };

            const soalList = (dbSoal || []).filter(s => {
                if(!s || !s.Topik) return false;
                const topikMatch = String(s.Topik).trim().toLowerCase() === mapelUtama.toLowerCase();
                const kelasSoal = String(getKelasOfSoal(s)).toLowerCase();
                const kelasMatch = kelasSoal === userKelasSafe || kelasSoal === 'semua';
                return topikMatch && kelasMatch;
            });

            const doSubmit = async () => {
                if (isSaving) return;
                setIsSaving(true);
                let benar = 0;
                soalList.forEach((s, i) => { if (answers[i] === s.Kunci) benar++; });
                
                const hasil = { 
                    Timestamp: new Date().toLocaleString(), 
                    NISN: user.NISN, 
                    Mapel: examData.Mapel, 
                    Skor: Math.round((benar/soalList.length)*100)||0, 
                    Jawaban_User: JSON.stringify(answers), 
                    Analisis_Butir: `Benar ${benar}/${soalList.length}` 
                };
                
                const success = await onFinish(hasil);
                if (!success) {
                    setIsSaving(false);
                    submitAttempted.current = false;
                    setShowSummary(false);
                } else {
                    // Hapus progress yang tersimpan dari browser jika berhasil dikumpulkan
                    localStorage.removeItem(progressKey);
                }
            };

            // Interval Timer Mundur Otomatis
            useEffect(() => {
                if (timeLeft <= 0 && soalList.length > 0 && !submitAttempted.current) {
                    submitAttempted.current = true;
                    doSubmit(); // Auto Submit Jika Waktu Habis
                }
                const timer = setInterval(() => setTimeLeft(prev => prev > 0 ? prev - 1 : 0), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const confirmSubmitExam = () => { doSubmit(); };

            const handleMatchChange = (opsiLabel, val) => {
                const currentAns = answers[currentNumber] ? answers[currentNumber].split(',') : [];
                let parsedMap = {};
                currentAns.forEach(pair => { if(pair.includes(':')) { const [k, v] = pair.split(':'); parsedMap[k] = v; } });
                parsedMap[opsiLabel] = val;
                setAnswers(prev => ({...prev, [currentNumber]: `A:${parsedMap.A || ''},B:${parsedMap.B || ''}`}));
            };

            if (soalList.length === 0) return <div className="p-10 text-center font-bold text-slate-600">Tidak ada soal untuk mata pelajaran ini di kelas Anda! <button onClick={()=>window.location.reload()} className="ml-2 text-blue-600 underline">Kembali</button></div>;
            
            const soalNow = soalList[currentNumber];
            const totalDijawab = Object.keys(answers).filter(k => {
                if(!answers[k]) return false;
                if(soalList[k]?.Tipe_Soal === 'Mencocokkan') return answers[k].includes('A:') && answers[k].includes('B:') && answers[k].length > 6;
                return true;
            }).length;
            const totalRagu = Object.keys(doubtful).filter(k => doubtful[k]).length;
            const totalBelum = soalList.length - totalDijawab;

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            return (
                <div className="h-screen flex flex-col bg-slate-100 select-none relative pb-safe">
                    <header className="bg-red-600 text-white px-4 md:px-6 py-3 flex justify-between items-center shadow-md z-10 shrink-0">
                        <div className="font-bold text-sm md:text-lg flex items-center">
                            {appConfig.logo && <img src={getSafeImageUrl(appConfig.logo)} className="h-8 mr-3 bg-white rounded p-0.5 hidden sm:block object-contain" onError={(e) => { e.target.style.display='none'; }} />}
                            {mapelUtama} <span className="font-normal text-xs md:text-sm ml-2 opacity-80">({user?.Nama})</span>
                        </div>
                        <div className="flex gap-2 md:gap-4 items-center">
                            <div className="flex items-center gap-2 bg-red-800 px-3 md:px-4 py-1.5 rounded-lg shadow-inner">
                                <span className="text-xs font-medium text-red-200 hidden md:inline">Sisa Waktu:</span>
                                <div className="font-mono text-sm md:text-xl font-bold text-white flex items-center"><i className="far fa-clock text-amber-300 mr-2"></i>{formatTime(timeLeft)}</div>
                            </div>
                            <button onClick={()=>setShowSummary(true)} className="bg-white text-red-600 hover:bg-slate-100 px-3 md:px-5 py-1.5 md:py-2 rounded font-bold shadow transition text-sm">Selesai</button>
                        </div>
                    </header>
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="bg-white rounded-xl shadow p-6 md:p-8 max-w-4xl mx-auto">
                                <div className="flex justify-between items-center border-b pb-3 mb-6">
                                    <h3 className="font-bold text-lg md:text-xl text-slate-800">Soal No. {currentNumber + 1}</h3>
                                    <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border">{soalNow?.Tipe_Soal || 'Pilihan Ganda'}</span>
                                </div>
                                
                                {soalNow?.Media_URL && (
                                    <div className="mb-6 flex justify-center bg-slate-50 p-4 rounded-xl border">
                                        <img src={getSafeImageUrl(soalNow.Media_URL)} className="max-h-64 object-contain rounded" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x150?text=Gambar+Gagal+Dimuat'; }} />
                                    </div>
                                )}
                                
                                <p className="text-lg md:text-xl mb-8 leading-relaxed text-slate-800">{soalNow?.Pertanyaan}</p>
                                
                                {(!soalNow?.Tipe_Soal || soalNow.Tipe_Soal === 'Pilihan Ganda') && (
                                    <div className="grid grid-cols-1 gap-4">
                                        {['A', 'B', 'C', 'D'].map((opsi) => {
                                            if(!soalNow[`Opsi_${opsi}`]) return null;
                                            const isSelected = answers[currentNumber] === opsi;
                                            return (
                                                <label key={opsi} className={`flex items-center gap-4 p-4 md:p-5 border-2 rounded-xl cursor-pointer transition ${isSelected ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-red-200'}`}>
                                                    <input type="radio" className="hidden" checked={isSelected} onChange={() => setAnswers(prev => ({...prev, [currentNumber]: opsi}))} />
                                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${isSelected ? 'border-red-500 bg-red-600 text-white' : 'border-slate-300 font-bold text-slate-400'}`}>
                                                        {isSelected ? <div className="w-3 h-3 bg-white rounded-full"></div> : opsi}
                                                    </div>
                                                    <div className="flex-1 text-base md:text-lg text-slate-800 break-words overflow-hidden">
                                                        {isImageUrl(soalNow[`Opsi_${opsi}`]) ? (
                                                            <img src={getSafeImageUrl(soalNow[`Opsi_${opsi}`])} alt={`Opsi ${opsi}`} className="max-h-32 object-contain rounded border p-1 bg-white shadow-sm" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150x50?text=Gambar+Gagal+Dimuat'; }} />
                                                        ) : (
                                                            <span>{soalNow[`Opsi_${opsi}`]}</span>
                                                        )}
                                                    </div>
                                                </label>
                                            )
                                        })}
                                    </div>
                                )}

                                {soalNow?.Tipe_Soal === 'Benar/Salah' && (
                                    <div className="grid grid-cols-2 gap-4 md:gap-6">
                                        {['A', 'B'].map((opsi) => {
                                            const isSelected = answers[currentNumber] === opsi;
                                            const label = opsi === 'A' ? 'Benar' : 'Salah';
                                            const colorClass = opsi === 'A' ? 'emerald' : 'red';
                                            return (
                                                <label key={opsi} className={`flex flex-col items-center gap-4 p-4 md:p-6 border-2 rounded-xl cursor-pointer transition ${isSelected ? `border-${colorClass}-500 bg-${colorClass}-50` : 'border-slate-200 hover:border-slate-300'}`}>
                                                    <input type="radio" className="hidden" checked={isSelected} onChange={() => setAnswers(prev => ({...prev, [currentNumber]: opsi}))} />
                                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center ${isSelected ? `border-${colorClass}-500 bg-${colorClass}-500 text-white` : 'border-slate-300'}`}>{isSelected && <i className="fas fa-check"></i>}</div>
                                                    <div className={`text-xl md:text-2xl font-black ${isSelected ? `text-${colorClass}-600` : 'text-slate-600'}`}>{label}</div>
                                                </label>
                                            )
                                        })}
                                    </div>
                                )}

                                {soalNow?.Tipe_Soal === 'Mencocokkan' && (
                                    <div className="space-y-4 md:space-y-6 bg-red-50/50 p-4 md:p-6 border border-red-100 rounded-xl">
                                        <p className="text-sm font-bold text-red-800 mb-4"><i className="fas fa-link mr-2"></i>Pasangkan premis di kiri dengan pilihan yang tepat.</p>
                                        {['A', 'B'].map(premisKey => {
                                            if(!soalNow[`Opsi_${premisKey}`]) return null;
                                            const currentAns = answers[currentNumber] || '';
                                            let currentMatch = '';
                                            if(currentAns.includes(`${premisKey}:`)) currentMatch = currentAns.split(`${premisKey}:`)[1].split(',')[0];
                                            return (
                                                <div key={premisKey} className="flex flex-col md:flex-row items-center gap-4 bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                                                    <div className="flex-1 font-bold text-base md:text-lg w-full text-center md:text-left">{soalNow[`Opsi_${premisKey}`]}</div>
                                                    <i className="fas fa-arrow-down md:fa-arrow-right text-slate-300 block"></i>
                                                    <div className="w-full md:w-1/2 shrink-0">
                                                        <select className="w-full p-3 border-2 border-red-200 rounded-lg outline-none focus:border-red-500 font-medium text-sm md:text-base" value={currentMatch} onChange={(e) => handleMatchChange(premisKey, e.target.value)}>
                                                            <option value="">-- Pilih Pasangan --</option>
                                                            {soalNow.Opsi_C && <option value="C">{soalNow.Opsi_C}</option>}
                                                            {soalNow.Opsi_D && <option value="D">{soalNow.Opsi_D}</option>}
                                                        </select>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                                
                                <div className="flex flex-col md:flex-row justify-between items-center mt-10 border-t pt-6 gap-4">
                                    <button disabled={currentNumber===0} onClick={()=>setCurrentNumber(p=>p-1)} className="w-full md:w-auto px-6 py-3 bg-slate-200 rounded-lg font-bold text-slate-700 hover:bg-slate-300 disabled:opacity-50 transition"><i className="fas fa-arrow-left mr-2"></i>Prev</button>
                                    <label className="w-full md:w-auto flex justify-center items-center gap-2 cursor-pointer select-none bg-yellow-50 px-6 py-3 rounded-lg border border-yellow-300 text-yellow-700 font-bold hover:bg-yellow-100 transition">
                                        <input type="checkbox" className="w-5 h-5 accent-yellow-500" checked={doubtful[currentNumber] || false} onChange={()=>setDoubtful(p=>({...p, [currentNumber]: !p[currentNumber]}))} />
                                        Ragu-Ragu
                                    </label>
                                    <button disabled={currentNumber===soalList.length-1} onClick={()=>setCurrentNumber(p=>p+1)} className="w-full md:w-auto px-6 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 disabled:opacity-50 transition">Next<i className="fas fa-arrow-right ml-2"></i></button>
                                </div>
                            </div>
                        </div>
                        
                        <div className="w-full md:w-80 bg-white border-t md:border-t-0 md:border-l p-4 flex flex-col h-48 md:h-auto shrink-0">
                            <h3 className="font-bold text-center mb-4 border-b pb-2 hidden md:block">Navigasi Soal</h3>
                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                <div className="grid grid-cols-6 md:grid-cols-5 gap-2">
                                    {soalList.map((s, i) => {
                                        let isAnswered = false;
                                        if (s?.Tipe_Soal === 'Mencocokkan') { isAnswered = answers[i] && answers[i].includes('A:') && answers[i].includes('B:') && answers[i].length > 6; } 
                                        else { isAnswered = answers[i] !== undefined && answers[i] !== ''; }

                                        let btnClass = 'bg-slate-100 text-slate-500 hover:bg-slate-200 border-transparent';
                                        if (i === currentNumber) btnClass = 'ring-2 ring-red-600 bg-white text-red-600';
                                        else if (doubtful[i]) btnClass = 'bg-yellow-400 text-yellow-900 border-transparent shadow-sm';
                                        else if (isAnswered) btnClass = 'bg-red-600 text-white border-transparent shadow-sm';
                                        
                                        return <button key={i} onClick={()=>setCurrentNumber(i)} className={`h-10 md:h-12 rounded font-bold text-sm md:text-base border transition ${btnClass}`}>{i+1}</button>;
                                    })}
                                </div>
                            </div>
                            <div className="mt-4 pt-4 border-t text-xs font-bold text-slate-500 grid grid-cols-2 gap-2">
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-red-600 rounded"></div>Terjawab</div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-yellow-400 rounded"></div>Ragu-Ragu</div>
                                <div className="flex items-center gap-2 col-span-2"><div className="w-3 h-3 bg-slate-100 border rounded"></div>Belum Dijawab</div>
                            </div>
                        </div>
                    </div>

                    {/* LAYAR KONFIRMASI (SUMMARY MODAL) */}
                    {showSummary && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full overflow-hidden">
                                <div className="bg-red-600 p-6 text-center text-white"><i className="fas fa-clipboard-check text-4xl mb-2"></i><h2 className="text-xl font-bold">Konfirmasi Kumpul</h2></div>
                                <div className="p-6">
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-50 p-4 rounded-xl text-center border"><div className="text-2xl font-black text-slate-800">{soalList.length}</div><div className="text-xs font-bold text-slate-500 uppercase mt-1">Total Soal</div></div>
                                        <div className="bg-red-50 p-4 rounded-xl text-center border border-red-200"><div className="text-2xl font-black text-red-600">{totalDijawab}</div><div className="text-xs font-bold text-red-600 uppercase mt-1">Terjawab</div></div>
                                        <div className="bg-yellow-50 p-4 rounded-xl text-center border border-yellow-200"><div className="text-2xl font-black text-yellow-600">{totalRagu}</div><div className="text-xs font-bold text-yellow-600 uppercase mt-1">Ragu-ragu</div></div>
                                        <div className="bg-slate-100 p-4 rounded-xl text-center border border-slate-300"><div className="text-2xl font-black text-slate-600">{totalBelum}</div><div className="text-xs font-bold text-slate-600 uppercase mt-1">Kosong</div></div>
                                    </div>
                                    {(totalBelum > 0 || totalRagu > 0) && (<div className="bg-amber-50 text-amber-700 p-3 rounded-lg text-sm mb-6 font-medium border border-amber-200 flex items-start gap-2"><i className="fas fa-exclamation-triangle mt-1"></i><div>Masih ada soal kosong atau ditandai ragu-ragu. Waktu Anda tersisa <strong>{formatTime(timeLeft)}</strong>.</div></div>)}
                                    <div className="flex gap-3">
                                        <button disabled={isSaving} onClick={()=>setShowSummary(false)} className="flex-1 bg-slate-200 py-3 rounded-xl font-bold hover:bg-slate-300 text-slate-800 transition disabled:opacity-50">Kembali</button>
                                        <button disabled={isSaving} onClick={confirmSubmitExam} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition disabled:opacity-50">Kumpulkan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LAYAR LOADING PENYIMPANAN */}
                    {isSaving && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-white/90 p-4">
                            <div className="flex flex-col items-center">
                                <i className="fas fa-spinner fa-spin text-5xl text-red-600 mb-4"></i>
                                <h2 className="text-xl font-bold text-slate-800">Menyimpan Nilai...</h2>
                                <p className="text-slate-500 mt-2 font-medium">Mohon jangan tutup halaman ini!</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
