                            </div>
                            <button type="submit" className="w-full bg-red-600 text-white font-bold py-2 rounded hover:bg-red-700 transition">
                                Simpan Akun
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN DATA PESERTA
           ========================================== */
        const DataPeserta = ({ data = [], setDbSiswa, apiCall, isAdmin, isGuruMapel, targetAkses, availableClasses, appConfig, setAppConfig }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterKelas, setFilterKelas] = useState('');
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const fileSiswaRef = useRef(null);

            const [formSiswa, setFormSiswa] = useState({
                NISN: '', Nama: '', Kelas: '', Grup: 'A', Password: '', Status_Aktif: 'TRUE'
            });

            // Filter data sesuai hak akses (Admin & Guru Mapel bisa dropdown, Guru Kelas dikunci)
            const filteredData = (data || []).filter(row => {
                if(!row) return false;
                if(!isAdmin && !isGuruMapel && row.Kelas !== targetAkses) return false; // Restriksi Wali Kelas
                if((isAdmin || isGuruMapel) && filterKelas && row.Kelas !== filterKelas) return false; // Dropdown Filter
                return Object.values(row).some(val => val != null && String(val).toLowerCase().includes(searchTerm.toLowerCase()));
            });

            const handleSubmitManual = (e) => {
                e.preventDefault();
                if (isEditing) {
                    setDbSiswa(prev => prev.map(s => s.NISN === formSiswa.NISN ? formSiswa : s));
                    apiCall('editSiswa', formSiswa);
                    alert("Data siswa diperbarui!");
                } else {
                    setDbSiswa(prev => [...prev, formSiswa]);
                    apiCall('addSiswa', formSiswa);
                    alert("Data siswa ditambahkan!");
                }
                setShowAddModal(false);
            };

            const handleEditClick = (siswa) => {
                setFormSiswa(siswa); 
                setIsEditing(true); 
                setShowAddModal(true);
            };

            const handleDeleteSiswa = (nisn, nama) => {
                if(window.confirm(`Yakin ingin menghapus siswa "${nama}" (NISN: ${nisn}) secara permanen?`)) {
                    setDbSiswa(prev => prev.filter(s => s.NISN !== nisn));
                    apiCall('deleteSiswa', { NISN: nisn });
                    alert("Data siswa berhasil dihapus!");
                }
            };

            const handleAddNewClick = () => {
                setFormSiswa({ NISN: '', Nama: '', Kelas: filterKelas || '', Grup: 'A', Password: '', Status_Aktif: 'TRUE' });
                setIsEditing(false); 
                setShowAddModal(true);
            };

            const handleImportCSVSiswa = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim() !== '');
                    if (rows.length < 2) return alert("File kosong atau hanya berisi header.");
                    
                    let importCount = 0;
                    let importedClasses = [];

                    for (let i = 1; i < rows.length; i++) {
                        const rowData = rows[i].split(',');
                        if (rowData.length < 6) continue; 
                        
                        const classFromCSV = rowData[2] ? rowData[2].trim() : '';

                        if (classFromCSV && !availableClasses.includes(classFromCSV) && !importedClasses.includes(classFromCSV)) {
                            importedClasses.push(classFromCSV);
                        }

                        const newSiswa = {
                            NISN: rowData[0].trim(),
                            Nama: rowData[1].trim(),
                            Kelas: classFromCSV,
                            Grup: rowData[3] ? rowData[3].trim() : 'A',
                            Password: rowData[4] ? rowData[4].trim() : '12345',
                            Status_Aktif: rowData[5] ? rowData[5].trim().toUpperCase() : 'TRUE'
                        };
                        setDbSiswa(prev => [...prev, newSiswa]);
                        apiCall('addSiswa', newSiswa);
                        importCount++;
                    }

                    if (importedClasses.length > 0 && isAdmin) {
                        const newClasses = [...new Set([...availableClasses, ...importedClasses])].sort();
                        const newConfig = { ...appConfig, daftarRombel: newClasses.join(',') };
                        setAppConfig(newConfig);
                        apiCall('saveConfig', newConfig);
                    }

                    alert(`Berhasil mengimpor ${importCount} siswa.`);
                    setShowImportModal(false);
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <div className="flex flex-col lg:flex-row lg:justify-between lg:items-center mb-6 gap-4 print-hidden">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800">Data Peserta Ujian</h2>
                        <div className="flex flex-col md:flex-row gap-2 w-full lg:w-auto">
                            {(isAdmin || isGuruMapel) && (
                                <select className="w-full md:w-48 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm bg-white shadow-sm" value={filterKelas} onChange={(e) => setFilterKelas(e.target.value)}>
                                    <option value="">Semua Kelas</option>
                                    {availableClasses.map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                            )}
                            <div className="relative w-full md:w-auto">
                                <i className="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                                <input type="text" placeholder="Cari NISN, Nama..." className="w-full md:w-56 pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            
                            {isAdmin && (
                                <div className="flex gap-2 w-full md:w-auto">
                                    <button onClick={() => setShowImportModal(true)} className="flex-1 md:flex-none justify-center bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                        <i className="fas fa-upload"></i> Import CSV
                                    </button>
                                    <button onClick={handleAddNewClick} className="flex-1 md:flex-none justify-center bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                        <i className="fas fa-user-plus"></i> Tambah Siswa
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto print-hidden">
                        {filteredData.length === 0 ? (
                            <div className="p-6 text-center text-slate-500">Tidak ada data peserta ditemukan.</div>
                        ) : (
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="p-4 border-b">NISN</th>
                                        <th className="p-4 border-b">Nama Siswa SD</th>
                                        <th className="p-4 border-b">Kelas</th>
                                        <th className="p-4 border-b">Status</th>
                                        {isAdmin && <th className="p-4 border-b text-center">Aksi</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map((siswa, i) => (
                                        <tr key={i} className="hover:bg-slate-50 border-b">
                                            <td className="p-4 font-mono text-slate-600">{siswa.NISN}</td>
                                            <td className="p-4 font-bold">{siswa.Nama}</td>
                                            <td className="p-4">{siswa.Kelas}</td>
                                            <td className="p-4"><span className={`px-2 py-1 rounded text-xs font-bold ${String(siswa?.Status_Aktif).toUpperCase() === 'TRUE' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{String(siswa?.Status_Aktif).toUpperCase() === 'TRUE' ? 'Aktif' : 'Nonaktif'}</span></td>
                                            {isAdmin && (
                                                <td className="p-4 text-center">
                                                    <div className="flex justify-center gap-2">
                                                        <button onClick={() => handleEditClick(siswa)} className="bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fas fa-edit md:mr-1"></i> <span className="hidden md:inline">Edit</span></button>
                                                        <button onClick={() => handleDeleteSiswa(siswa.NISN, siswa.Nama)} className="bg-red-100 text-red-700 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fas fa-trash md:mr-1"></i> <span className="hidden md:inline">Hapus</span></button>
                                                    </div>
                                                </td>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* MODAL TAMBAH/EDIT PESERTA */}
                    {showAddModal && isAdmin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
                                <h3 className="text-xl font-bold mb-4 border-b pb-2">{isEditing ? 'Edit Data Siswa' : 'Tambah Data Siswa'}</h3>
                                <form onSubmit={handleSubmitManual} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="text-sm font-bold block mb-1">NISN / Username</label><input required disabled={isEditing} type="text" className={`w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 ${isEditing ? 'bg-slate-100 text-slate-500' : ''}`} value={formSiswa.NISN || ''} onChange={(e) => setFormSiswa({...formSiswa, NISN: e.target.value})} /></div>
                                        <div><label className="text-sm font-bold block mb-1">Password</label><input required type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500" value={formSiswa.Password || ''} onChange={(e) => setFormSiswa({...formSiswa, Password: e.target.value})} /></div>
                                    </div>
                                    <div><label className="text-sm font-bold block mb-1">Nama Lengkap Siswa</label><input required type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500" value={formSiswa.Nama || ''} onChange={(e) => setFormSiswa({...formSiswa, Nama: e.target.value})} /></div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-sm font-bold block mb-1">Kelas</label>
                                            <select required className="w-full border p-2 rounded bg-white outline-none focus:ring-2 focus:ring-red-500" value={formSiswa.Kelas || ''} onChange={(e) => setFormSiswa({...formSiswa, Kelas: e.target.value})}>
                                                <option value="">-- Pilih Kelas --</option>
                                                {availableClasses.map(num => <option key={num} value={num}>{num}</option>)}
                                            </select>
                                        </div>
                                        <div><label className="text-sm font-bold block mb-1">Grup Ujian</label><input type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500" value={formSiswa.Grup || ''} onChange={(e) => setFormSiswa({...formSiswa, Grup: e.target.value})} placeholder="A/B/C" /></div>
                                    </div>
                                    <div>
                                        <label className="text-sm font-bold block mb-1">Status Akun</label>
                                        <select className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 bg-white" value={String(formSiswa.Status_Aktif || '').toUpperCase()} onChange={(e) => setFormSiswa({...formSiswa, Status_Aktif: e.target.value})}>
                                            <option value="TRUE">Aktif</option><option value="FALSE">Nonaktif</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-4 border-t mt-2">
                                        <button type="button" onClick={()=>setShowAddModal(false)} className="flex-1 bg-slate-200 py-2.5 rounded-lg font-bold hover:bg-slate-300 transition">Batal</button>
                                        <button type="submit" className="flex-1 bg-red-600 text-white py-2.5 rounded-lg font-bold hover:bg-red-700 transition shadow">{isEditing ? 'Perbarui Data' : 'Simpan Data'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showImportModal && isAdmin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 text-center">
                                <i className="fas fa-users text-5xl text-amber-500 mb-4"></i>
                                <h3 className="text-xl font-bold mb-2">Import Data Siswa (CSV)</h3>
                                <p className="text-sm text-slate-500 mb-6">Pastikan format kolom sesuai dengan template (NISN, Nama, Kelas, Grup, Password, Status).</p>
                                
                                <button onClick={() => {
                                    const header = "NISN,Nama,Kelas,Grup,Password,Status_Aktif\n";
                                    const dummy = "112233,Ahmad Yusuf,Kelas 6,A,pass1122,TRUE\n";
                                    const link = document.createElement("a");
                                    link.setAttribute("href", "data:text/csv;charset=utf-8," + encodeURI(header + dummy));
                                    link.setAttribute("download", "Template_Import_Siswa_SD.csv");
                                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                                }} className="w-full bg-slate-100 text-slate-700 py-2.5 rounded-lg font-bold mb-4 border border-slate-300 hover:bg-slate-200 transition">
                                    <i className="fas fa-download mr-2"></i> Download Template CSV
                                </button>
                                <input type="file" accept=".csv" ref={fileSiswaRef} className="hidden" onChange={handleImportCSVSiswa} />
                                <button onClick={() => fileSiswaRef.current.click()} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold mb-4 shadow-lg hover:bg-red-700 transition">Upload File CSV</button>
                                <button onClick={()=>setShowImportModal(false)} className="w-full text-slate-400 text-sm font-bold mt-2 hover:text-slate-600 transition">Batal</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN MANAJEMEN SOAL BERHIERARKI
           ========================================== */
        const ManajemenSoal = ({ dbSoal, setDbSoal, user, isAdmin, isGuruMapel, isGuruKelas, targetAkses, apiCall, dbGuru, availableClasses }) => {
            const [showModal, setShowModal] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const fileInputRef = useRef(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [uploadingOpsi, setUploadingOpsi] = useState(null);
            
            const [form, setForm] = useState({ 
                ID_Soal: '', Tipe_Soal: 'Pilihan Ganda', Topik: '', Pertanyaan: '', 
                Opsi_A: '', Opsi_B: '', Opsi_C: '', Opsi_D: '', Kunci: 'A', Media_URL: '' 
            });

            const [viewStep, setViewStep] = useState((isAdmin || isGuruMapel) ? 'kelas' : 'mapel'); 
            const [selectedKelas, setSelectedKelas] = useState((isAdmin || isGuruMapel) ? '' : targetAkses);
            const [selectedMapel, setSelectedMapel] = useState(isGuruMapel ? targetAkses : '');

            const getKelasOfSoal = (soal) => {
                if(!soal || !soal.Pembuat) return 'Semua';
                const pembuatStr = String(soal.Pembuat).trim();
                
                // Cek format Pembuat "Nama (Kelas X)"
                const match = pembuatStr.match(/\((.*?)\)$/);
                if (match && match[1]) {
                    return match[1].trim();
                }

                // Fallback cek di DB_Guru
                const guru = (dbGuru || []).find(g => g && String(g.Nama_Guru).trim() === pembuatStr);
                return guru ? String(guru.Kelas_Guru).trim() : 'Semua';
            };

            const safeUserKelas = String(selectedKelas || '').trim().toLowerCase();
            const safeMapel = String(selectedMapel || '').trim().toLowerCase();

            const displayedSoal = (dbSoal || []).filter(s => {
                if (!s || !s.Topik) return false;
                const topikMatch = String(s.Topik).trim().toLowerCase() === safeMapel;
                const kelasSoal = String(getKelasOfSoal(s)).toLowerCase();
                const kelasMatch = kelasSoal === safeUserKelas || kelasSoal === 'semua';
                return topikMatch && kelasMatch;
            });

            const filteredData = displayedSoal.filter(row => Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 500) { height *= 500 / width; width = 500; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        setForm({...form, Media_URL: canvas.toDataURL('image/jpeg', 0.5)});
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleOpsiImageUpload = (file, opsiKey) => {
                if (!file) return;
                setUploadingOpsi(opsiKey);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 400) { height *= 400 / width; width = 400; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        
                        const base64Str = canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.8);
                        
                        const payload = {
                            filename: `Opsi_${Date.now()}.${file.type.split('/')[1] || 'jpg'}`,
                            mimeType: file.type,
                            base64: base64Str
                        };
                        
                        try {
                            const res = await apiCall('uploadImage', payload);
                            if(res && res.status === 'success') {
                                setForm(prev => ({...prev, [opsiKey]: res.url}));
                            } else {
                                alert("Gagal mengupload gambar ke Drive. Pesan Error: " + (res?.message || "Pastikan Deploy Code.gs terbaru."));
                            }
                        } catch(e) { alert("Error saat mengupload ke Cloud."); }
                        setUploadingOpsi(null);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleSubmitManual = (e) => {
                e.preventDefault();
                // Jika Mapel (Bisa semua kelas), set Pembuat = Nama Guru (Kelas 6)
                const newPembuat = isEditing ? form.Pembuat : (isGuruKelas ? user.Nama_Guru : `${user.Nama_Guru} (${selectedKelas})`);
                const newSoal = { ...form, Pembuat: isAdmin ? `Administrator (${selectedKelas})` : newPembuat };
                
                if (isEditing) {
                    setDbSoal(prev => prev.map(s => s.ID_Soal === form.ID_Soal ? newSoal : s));
                    apiCall('editSoal', newSoal); 
                    alert("Soal diperbarui!");
                } else {
                    setDbSoal(prev => [...prev, newSoal]);
                    apiCall('addSoal', newSoal); 
                    alert("Soal ditambahkan!");
                }
                setShowModal(false);
            };

            const handleAddNewClick = () => {
                const prefix = selectedMapel.substring(0, 3).toUpperCase();
                const uniqueId = `${prefix}-${Math.floor(10000 + Math.random() * 90000)}`;
                setForm({ ID_Soal: uniqueId, Tipe_Soal: 'Pilihan Ganda', Topik: selectedMapel, Pertanyaan: '', Opsi_A: '', Opsi_B: '', Opsi_C: '', Opsi_D: '', Kunci: 'A', Media_URL: '', Pembuat: '' });
                setIsEditing(false); setShowModal(true);
            };

            const handleEditClick = (soal) => {
                setForm(soal); setIsEditing(true); setShowModal(true);
            };

            const handleDeleteSoal = (idSoal) => {
                if(window.confirm(`Yakin ingin menghapus soal dengan ID "${idSoal}" secara permanen?`)) {
                    setDbSoal(prev => prev.filter(s => s.ID_Soal !== idSoal));
                    apiCall('deleteSoal', { ID_Soal: idSoal });
                    alert("Soal berhasil dihapus!");
                }
            };

            const handleTypeChange = (e) => {
                const type = e.target.value;
                setForm({ ...form, Tipe_Soal: type, Opsi_A: type==='Benar/Salah'?'Benar':'', Opsi_B: type==='Benar/Salah'?'Salah':'', Opsi_C: '', Opsi_D: '', Kunci: type==='Benar/Salah'?'A':(type==='Mencocokkan'?'A:C,B:D':'A') });
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim() !== '');
                    if (rows.length < 2) return alert("File kosong atau hanya berisi header.");
                    
                    let importCount = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const rowData = rows[i].split(',');
                        if (rowData.length < 9) continue; 
                        
                        const newPembuat = isGuruKelas ? user.Nama_Guru : `${user.Nama_Guru} (${selectedKelas})`;

                        const newSoal = {
                            ID_Soal: rowData[0] || `IMP-${Date.now()}-${i}`,
                            Tipe_Soal: rowData[1] || 'Pilihan Ganda',
                            Topik: rowData[2] || selectedMapel,
                            Pertanyaan: rowData[3],
                            Opsi_A: rowData[4],
                            Opsi_B: rowData[5],
                            Opsi_C: rowData[6],
                            Opsi_D: rowData[7],
                            Kunci: rowData[8] ? rowData[8].toUpperCase().trim() : 'A',
                            Media_URL: rowData[9] || '',
                            Pembuat: isAdmin ? `Administrator (${selectedKelas})` : newPembuat
                        };
                        setDbSoal(prev => [...prev, newSoal]);
                        apiCall('addSoal', newSoal);
                        importCount++;
                    }
                    alert(`Berhasil mengimpor ${importCount} soal.`);
                    setShowImport(false);
                };
                reader.readAsText(file);
            };

            const handleBack = () => {
                if (viewStep === 'soal') {
                    if(isGuruMapel) setViewStep('kelas');
                    else setViewStep('mapel');
                }
                else if (viewStep === 'mapel' && (isAdmin || isGuruMapel)) setViewStep('kelas');
            };

            return (
                <div>
                    {(isAdmin || isGuruMapel) && viewStep === 'kelas' && (
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2 print-hidden"><i className="fas fa-folder-open text-red-600 mr-2"></i> Verifikasi Bank Soal</h2>
                            <p className="text-slate-500 mb-8 print-hidden">Pilih kelas untuk melihat, menambah, dan memverifikasi soal pada tiap tingkatan kelas.</p>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 print-hidden">
                                {availableClasses.map(namaKelas => {
                                    const count = (dbSoal || []).filter(s => s && String(getKelasOfSoal(s)).trim().toLowerCase() === String(namaKelas).trim().toLowerCase() && (isGuruMapel ? String(s.Topik).trim().toLowerCase() === targetAkses.toLowerCase() : true)).length;
                                    return (
                                        <button key={namaKelas} onClick={() => { 
                                                setSelectedKelas(namaKelas); 
                                                if(isGuruMapel) {
                                                    setSelectedMapel(targetAkses);
                                                    setViewStep('soal');
                                                } else {
                                                    setViewStep('mapel'); 
                                                }
                                            }} className="bg-white border-2 border-red-100 hover:border-red-500 p-6 rounded-xl flex flex-col items-center justify-center gap-3 shadow-sm transition group relative">
                                            <div className="bg-red-50 text-red-500 w-14 h-14 rounded-full flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition">
                                                <i className="fas fa-users text-xl"></i>
                                            </div>
                                            <span className="font-bold text-lg text-slate-700">{namaKelas}</span>
                                            <span className="text-xs font-bold text-slate-400">{count} Soal</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {viewStep === 'mapel' && (
                        <div>
                            <div className="flex items-center gap-4 mb-8 print-hidden">
                                {(isAdmin || isGuruMapel) && (
                                    <button onClick={handleBack} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-bold transition">
                                        <i className="fas fa-arrow-left mr-2"></i> Kembali
                                    </button>
                                )}
                                <h2 className="text-2xl font-bold text-slate-800">Mata Pelajaran {(isAdmin || isGuruMapel) ? `- ${selectedKelas}` : ''}</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 print-hidden">
                                {MAPEL_LIST.map(m => {
                                    const mSafe = String(m).trim().toLowerCase();
                                    const count = isAdmin 
                                        ? (dbSoal || []).filter(s => s && String(getKelasOfSoal(s)).trim().toLowerCase() === safeUserKelas && String(s.Topik).trim().toLowerCase() === mSafe).length
                                        : (dbSoal || []).filter(s => s && String(s.Pembuat).trim().toLowerCase() === String(user.Nama_Guru).trim().toLowerCase() && String(s.Topik).trim().toLowerCase() === mSafe).length;
                                    return (
                                        <button key={m} onClick={() => { setSelectedMapel(m); setViewStep('soal'); }} className="bg-white border-2 border-blue-100 hover:border-blue-500 p-6 rounded-xl flex flex-col items-center justify-center gap-3 shadow-sm transition group">
                                            <i className="fas fa-book text-4xl text-blue-500 group-hover:scale-110 transition-transform"></i>
                                            <span className="font-bold text-slate-700 text-center mt-2">{m}</span>
                                            <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">{count} Soal</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {viewStep === 'soal' && (
                        <div>
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 print-hidden">
                                <div className="flex items-center gap-3">
                                    <button onClick={handleBack} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded-lg font-bold transition">
                                        <i className="fas fa-arrow-left"></i>
                                    </button>
                                    <h2 className="text-xl md:text-2xl font-bold text-slate-800">
                                        Soal: {selectedMapel} {(isAdmin || isGuruMapel) ? `(${selectedKelas})` : ''}
                                    </h2>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                    <React.Fragment>
                                        <button onClick={() => setShowImport(true)} className="flex-1 md:flex-none justify-center bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow">
                                            <i className="fas fa-file-import"></i> Import CSV
                                        </button>
                                        <button onClick={handleAddNewClick} className="flex-1 md:flex-none justify-center bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow">
                                            <i className="fas fa-plus"></i> Tambah Manual
                                        </button>
                                    </React.Fragment>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border overflow-x-auto print-hidden">
                                <div className="p-4 border-b">
                                    <input type="text" placeholder="Cari ID Soal atau Pertanyaan..." className="w-full md:w-64 px-4 py-2 border rounded focus:ring-2 focus:ring-red-500 outline-none text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                {displayedSoal.length === 0 ? (
                                    <div className="p-6 text-center text-slate-500">Belum ada soal pada Mata Pelajaran ini.</div>
                                ) : (
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-100 text-slate-600">
                                            <tr><th className="p-4 border-b">ID</th><th className="p-4 border-b">Tipe</th><th className="p-4 border-b">Pertanyaan</th><th className="p-4 border-b">Aksi</th></tr>
                                        </thead>
                                        <tbody>
                                            {filteredData.map((soal, i) => (
                                                <tr key={i} className="border-b hover:bg-slate-50">
                                                    <td className="p-4 font-bold">{soal.ID_Soal}</td><td className="p-4">{soal.Tipe_Soal}</td>
                                                    <td className="p-4 truncate max-w-xs">{soal.Pertanyaan}</td>
                                                    <td className="p-4">
                                                        <div className="flex gap-2">
                                                            <button onClick={() => handleEditClick(soal)} className="bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fas fa-edit md:mr-1"></i> <span className="hidden md:inline">Edit</span></button>
                                                            <button onClick={() => handleDeleteSoal(soal.ID_Soal)} className="bg-red-100 text-red-700 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fas fa-trash md:mr-1"></i> <span className="hidden md:inline">Hapus</span></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>

                            {/* MODAL TAMBAH/EDIT SOAL */}
                            {showModal && (
                                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 overflow-y-auto pb-safe">
                                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full p-6 mt-10 mb-auto relative z-50">
                                        <h3 className="text-xl font-bold mb-4 border-b pb-2">{isEditing ? 'Lihat/Edit Soal' : 'Buat Soal Baru'}</h3>
                                        <form onSubmit={handleSubmitManual} className="space-y-4">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div><label className="text-sm font-bold block mb-1">ID Soal</label><input required disabled type="text" className={`w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 bg-slate-100 text-slate-500`} value={form.ID_Soal || ''} onChange={e=>setForm({...form, ID_Soal: e.target.value})} /></div>
                                                <div>
                                                    <label className="text-sm font-bold block mb-1">Tipe Soal</label>
                                                    <select disabled={isAdmin} className="w-full border p-2 rounded bg-white font-bold outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Tipe_Soal || ''} onChange={handleTypeChange}>
                                                        <option value="Pilihan Ganda">Pilihan Ganda (A-D)</option><option value="Benar/Salah">Benar atau Salah</option><option value="Mencocokkan">Mencocokkan</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-sm font-bold block mb-1">Mata Pelajaran</label>
                                                <select required disabled className="w-full border p-2 rounded bg-slate-100 font-bold text-slate-500" value={form.Topik || ''} onChange={e=>setForm({...form, Topik: e.target.value})}>
                                                    <option value={selectedMapel}>{selectedMapel}</option>
                                                </select>
                                            </div>
                                            <div className="p-3 bg-slate-50 border rounded-lg">
                                                <label className="text-sm font-bold block mb-1">Upload Gambar / Ilustrasi (Soal)</label>
                                                <input disabled={isAdmin} type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-sm mt-1 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100 disabled:opacity-50" />
                                                {form.Media_URL && <img src={getSafeImageUrl(form.Media_URL)} className="mt-2 h-20 object-contain rounded border p-1 bg-white" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150x50?text=Gagal+Dimuat'; }} />}
                                            </div>
                                            <div><label className="text-sm font-bold block mb-1">Pertanyaan / Perintah</label><textarea required disabled={isAdmin} className="w-full border p-2 rounded h-20 outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Pertanyaan || ''} onChange={e=>setForm({...form, Pertanyaan: e.target.value})}></textarea></div>
                                            
                                            {form.Tipe_Soal === 'Pilihan Ganda' && (
                                                <React.Fragment>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {['A', 'B', 'C', 'D'].map(opsi => (
                                                            <div key={opsi}>
                                                                <label className="text-sm font-bold block mb-1">Opsi {opsi}</label>
                                                                <div className="flex gap-2">
                                                                    <input required disabled={isAdmin} type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form[`Opsi_${opsi}`] || ''} onChange={e=>setForm({...form, [`Opsi_${opsi}`]: e.target.value})} placeholder={`Teks/Link Opsi ${opsi}...`} />
                                                                    {!isAdmin && (
                                                                        <label className={`shrink-0 bg-slate-200 px-3 flex items-center justify-center rounded cursor-pointer hover:bg-slate-300 transition ${uploadingOpsi === `Opsi_${opsi}` ? 'opacity-50' : ''}`} title={`Upload Gambar Opsi ${opsi}`}>
                                                                            {uploadingOpsi === `Opsi_${opsi}` ? <i className="fas fa-spinner fa-spin text-slate-600"></i> : <i className="fas fa-image text-slate-600"></i>}
                                                                            <input type="file" className="hidden" accept="image/*" onChange={(e) => handleOpsiImageUpload(e.target.files[0], `Opsi_${opsi}`)} />
                                                                        </label>
                                                                    )}
                                                                </div>
                                                                {isImageUrl(form[`Opsi_${opsi}`]) && <img src={getSafeImageUrl(form[`Opsi_${opsi}`])} className="mt-2 h-16 object-contain rounded border p-1 bg-white" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150x50?text=Gagal+Dimuat'; }} />}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div><label className="text-sm font-bold block mb-1 text-red-600">Kunci Jawaban</label>
                                                        <select disabled={isAdmin} className="w-full border p-2 rounded bg-red-50 font-bold outline-none focus:ring-2 focus:ring-red-500 disabled:opacity-80" value={form.Kunci || ''} onChange={e=>setForm({...form, Kunci: e.target.value})}><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                                                    </div>
                                                </React.Fragment>
                                            )}

                                            {form.Tipe_Soal === 'Benar/Salah' && (
                                                <React.Fragment>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><label className="text-sm font-bold block mb-1 text-slate-400">Opsi A</label><input disabled type="text" className="w-full border p-2 rounded bg-slate-100" value="Benar" /></div>
                                                        <div><label className="text-sm font-bold block mb-1 text-slate-400">Opsi B</label><input disabled type="text" className="w-full border p-2 rounded bg-slate-100" value="Salah" /></div>
                                                    </div>
                                                    <div><label className="text-sm font-bold block mb-1 text-red-600">Kunci Jawaban</label>
                                                        <select disabled={isAdmin} className="w-full border p-2 rounded bg-red-50 font-bold outline-none focus:ring-2 focus:ring-red-500 disabled:opacity-80" value={form.Kunci || ''} onChange={e=>setForm({...form, Kunci: e.target.value})}><option value="A">A (Benar)</option><option value="B">B (Salah)</option></select>
                                                    </div>
                                                </React.Fragment>
                                            )}

                                            {form.Tipe_Soal === 'Mencocokkan' && (
                                                <React.Fragment>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div className="space-y-2">
                                                            <label className="text-sm font-bold block mb-1">Daftar Premis (Kiri)</label>
                                                            <input required disabled={isAdmin} type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Opsi_A || ''} onChange={e=>setForm({...form, Opsi_A: e.target.value})} placeholder="Premis 1" />
                                                            <input required disabled={isAdmin} type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Opsi_B || ''} onChange={e=>setForm({...form, Opsi_B: e.target.value})} placeholder="Premis 2" />
                                                        </div>
                                                        <div className="space-y-2">
                                                            <label className="text-sm font-bold block mb-1">Jawaban (Kanan)</label>
                                                            <input required disabled={isAdmin} type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Opsi_C || ''} onChange={e=>setForm({...form, Opsi_C: e.target.value})} placeholder="Jawaban 1" />
                                                            <input required disabled={isAdmin} type="text" className="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-red-500 disabled:bg-slate-100 disabled:text-slate-500" value={form.Opsi_D || ''} onChange={e=>setForm({...form, Opsi_D: e.target.value})} placeholder="Jawaban 2" />
                                                        </div>
                                                    </div>
                                                    <div><label className="text-sm font-bold block mb-1 text-red-600">Kunci Jawaban</label><input disabled type="text" className="w-full border p-2 rounded bg-red-50 font-bold text-red-700" value="Premis 1 = Jawaban 1, Premis 2 = Jawaban 2" /></div>
                                                </React.Fragment>
                                            )}

                                            <div className="flex gap-3 pt-4 border-t mt-2">
                                                <button type="button" onClick={()=>setShowModal(false)} className="flex-1 bg-slate-200 py-2.5 rounded-lg font-bold hover:bg-slate-300 transition">{isAdmin ? 'Tutup' : 'Batal'}</button>
                                                {!isAdmin && <button disabled={uploadingOpsi !== null} type="submit" className="flex-1 bg-red-600 text-white py-2.5 rounded-lg font-bold shadow hover:bg-red-700 transition disabled:opacity-50">{isEditing ? 'Simpan Editan' : 'Simpan Baru'}</button>}
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {showImport && (
                                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 text-center relative z-50">
                                        <i className="fas fa-file-csv text-5xl text-amber-500 mb-4"></i>
                                        <h3 className="text-xl font-bold mb-6">Import Soal (CSV)</h3>
                                        <input type="file" accept=".csv" ref={fileInputRef} className="hidden" onChange={handleImportCSV} />
                                        <button onClick={() => {
                                            const header = "ID_Soal,Tipe_Soal,Topik,Pertanyaan,Opsi_A,Opsi_B,Opsi_C,Opsi_D,Kunci,Media_URL\n";
                                            const dummy = `MTK-01,Pilihan Ganda,${selectedMapel},Berapa 10+5?,10,15,20,25,D,\n`;
                                            const link = document.createElement("a");
                                            link.setAttribute("href", "data:text/csv;charset=utf-8," + encodeURI(header + dummy));
                                            link.setAttribute("download", `Template_Import_Soal_${selectedMapel}.csv`);
                                            document.body.appendChild(link); link.click(); document.body.removeChild(link);
                                        }} className="w-full bg-slate-100 text-slate-700 py-2.5 rounded-lg font-bold mb-4 border border-slate-300 hover:bg-slate-200 transition">
                                            <i className="fas fa-download mr-2"></i> Download Template CSV
                                        </button>
                                        <button onClick={() => fileInputRef.current.click()} className="w-full bg-red-600 text-white py-3 rounded-lg font-bold mb-4 shadow-lg hover:bg-red-700 transition">Pilih File CSV</button>
                                        <button onClick={()=>setShowImport(false)} className="w-full text-slate-400 text-sm font-bold mt-2 hover:text-slate-600 transition">Batal</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN HASIL UJIAN BERHIERARKI
           ========================================== */
        const HasilUjianHierarchy = ({ dbHasil, dbSiswa, isAdmin, isGuruMapel, isGuruKelas, targetAkses, availableClasses, appConfig }) => {
            const [viewStep, setViewStep] = useState((isAdmin || isGuruMapel) ? 'kelas' : 'mapel'); 
            const [selectedKelas, setSelectedKelas] = useState((isAdmin || isGuruMapel) ? '' : targetAkses);
            const [selectedMapel, setSelectedMapel] = useState(isGuruMapel ? targetAkses : '');
            const [searchTerm, setSearchTerm] = useState('');

            const handleBack = () => {
                if (viewStep === 'hasil') {
                    if (isGuruMapel) setViewStep('kelas');
                    else setViewStep('mapel');
                }
                else if (viewStep === 'mapel' && (isAdmin || isGuruMapel)) setViewStep('kelas');
            };

            const targetMapelSafe = `${String(selectedMapel).trim()} - ${String(selectedKelas).trim()}`.toLowerCase();
            const filteredHasil = (dbHasil || []).filter(h => h && h.Mapel && String(h.Mapel).trim().toLowerCase() === targetMapelSafe);
            const displayHasil = filteredHasil.filter(row => {
                if (!row) return false;
                if (!searchTerm) return true;
                return Object.values(row).some(val => val != null && String(val).toLowerCase().includes(searchTerm.toLowerCase()));
            });

            const handleExportCSV = () => {
                if (displayHasil.length === 0) return alert("Tidak ada data untuk diekspor");
                const exportData = displayHasil.map(row => {
                    const siswa = (dbSiswa || []).find(s => String(s.NISN) === String(row.NISN));
                    return {
                        "Waktu Submit": row.Timestamp,
                        "NISN": row.NISN,
                        "Nama Siswa": siswa ? siswa.Nama : 'Tidak Diketahui',
                        "Mapel Sesi": row.Mapel,
                        "Skor Akhir": row.Skor,
                        "Analisis Butir": row.Analisis_Butir
                    };
                });
                const headers = Object.keys(exportData[0]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...exportData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(","))].join("\n");
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `Hasil_${selectedMapel}_${selectedKelas}.csv`); link.click();
            };

            return (
                <div className="print:block print:w-full print:h-auto print:overflow-visible">
                    {(isAdmin || isGuruMapel) && viewStep === 'kelas' && (
                        <div className="print-hidden">
                            <h2 className="text-2xl font-bold text-slate-800 mb-2"><i className="fas fa-chart-bar text-red-600 mr-2"></i> Hasil Ujian (Pilih Kelas)</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mt-6">
                                {availableClasses.map(namaKelas => (
                                    <button key={namaKelas} onClick={() => { 
                                            setSelectedKelas(namaKelas); 
                                            if(isGuruMapel) { setViewStep('hasil'); } 
                                            else { setViewStep('mapel'); }
                                        }} className="bg-white border-2 border-red-100 hover:border-red-500 p-6 rounded-xl flex flex-col items-center justify-center gap-3 shadow-sm transition group">
                                        <div className="bg-red-50 text-red-500 w-14 h-14 rounded-full flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition"><i className="fas fa-users text-xl"></i></div>
                                        <span className="font-bold text-lg text-slate-700">{namaKelas}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {viewStep === 'mapel' && (
                        <div className="print-hidden">
                            <div className="flex items-center gap-4 mb-8">
                                {(isAdmin || isGuruMapel) && <button onClick={handleBack} className="bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg font-bold"><i className="fas fa-arrow-left"></i></button>}
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800">Hasil Ujian {(isAdmin || isGuruMapel) ? `- ${selectedKelas}` : ''}</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {MAPEL_LIST.map(m => {
                                    const mSafe = `${String(m).trim()} - ${String(selectedKelas).trim()}`.toLowerCase();
                                    const count = (dbHasil || []).filter(h => h && h.Mapel && String(h.Mapel).trim().toLowerCase() === mSafe).length;
                                    return (
                                        <button key={m} onClick={() => { setSelectedMapel(m); setViewStep('hasil'); }} className="bg-white border-2 border-blue-100 hover:border-blue-500 p-6 rounded-xl flex flex-col items-center justify-center gap-3 shadow-sm transition group">
                                            <i className="fas fa-chart-line text-4xl text-blue-500 group-hover:scale-110 transition-transform"></i>
                                            <span className="font-bold text-slate-700 text-center mt-2">{m}</span>
                                            <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">{count} Data</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {viewStep === 'hasil' && (
                        <div className="print-area print:block print:w-full print:h-auto print:overflow-visible">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 print-hidden">
                                <div className="flex items-center gap-3">
                                    <button onClick={handleBack} className="bg-slate-200 hover:bg-slate-300 px-3 py-2 rounded-lg font-bold"><i className="fas fa-arrow-left"></i></button>
                                    <h2 className="text-xl md:text-2xl font-bold text-slate-800">Nilai: {selectedMapel}</h2>
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" placeholder="Cari NISN, Skor..." className="w-full md:w-64 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    <button onClick={() => window.print()} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                        <i className="fas fa-file-pdf"></i> Cetak PDF
                                    </button>
                                    <button onClick={handleExportCSV} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                        <i className="fas fa-file-excel"></i> CSV
                                    </button>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border overflow-x-auto print:border-none print:shadow-none print:overflow-visible print:w-full">
                                <div className="print-visible text-center mb-6 border-b-2 border-black pb-4 mt-6">
                                    <h2 className="text-2xl font-black text-black uppercase">Daftar Nilai Hasil Ujian</h2>
                                    <h3 className="text-lg font-bold text-black mt-1">MATA PELAJARAN: {selectedMapel} - KELAS: {selectedKelas}</h3>
                                    <p className="text-sm font-medium mt-1 uppercase">{appConfig?.namaSekolah || 'Sekolah'}</p>
                                </div>
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-slate-100 text-slate-600"><tr><th className="p-4 border-b">No</th><th className="p-4 border-b">Waktu Submit</th><th className="p-4 border-b">NISN</th><th className="p-4 border-b">Nama Siswa</th><th className="p-4 border-b">Mapel Sesi</th><th className="p-4 border-b text-center">Skor Akhir</th></tr></thead>
                                    <tbody>
                                        {displayHasil.map((row, i) => {
                                            const siswa = (dbSiswa || []).find(s => String(s.NISN) === String(row.NISN));
                                            return (
                                                <tr key={i} className="hover:bg-slate-50 border-b"><td className="p-4 font-bold">{i+1}</td><td className="p-4">{row.Timestamp}</td><td className="p-4 font-mono font-bold">{row.NISN}</td><td className="p-4 font-bold text-slate-800">{siswa ? siswa.Nama : '-'}</td><td className="p-4">{row.Mapel}</td><td className="p-4 text-center font-black text-blue-600 text-lg">{row.Skor}</td></tr>
                                            );
                                        })}
                                        {displayHasil.length === 0 && <tr><td colSpan="6" className="p-6 text-center text-slate-500">Belum ada data nilai.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ==========================================
           SUB KOMPONEN REKAPITULASI HASIL (MATRIKS)
           ========================================== */
        const RekapitulasiHasil = ({ dbHasil, dbSiswa, isAdmin, isGuruMapel, isGuruKelas, targetAkses, availableClasses, appConfig, dbGuru }) => {
            const [selectedKelas, setSelectedKelas] = useState((isAdmin || isGuruMapel) ? '' : targetAkses);

            if ((isAdmin || isGuruMapel) && !selectedKelas) {
                return (
                    <div className="print-hidden">
                        <h2 className="text-2xl font-bold text-slate-800 mb-2"><i className="fas fa-table text-red-600 mr-2"></i> Rekapitulasi Hasil Akhir</h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mt-6">
                            {availableClasses.map(namaKelas => (
                                <button key={namaKelas} onClick={() => setSelectedKelas(namaKelas)} className="bg-white border-2 border-red-100 hover:border-red-500 p-6 rounded-xl flex flex-col items-center justify-center gap-3 shadow-sm transition group">
                                    <div className="bg-red-50 text-red-500 w-14 h-14 rounded-full flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition"><i className="fas fa-th-list text-xl"></i></div>
                                    <span className="font-bold text-lg text-slate-700">{namaKelas}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const siswaKelas = (dbSiswa || []).filter(s => s && s.Kelas === selectedKelas);
            const mapelToDisplay = isGuruMapel ? [targetAkses] : MAPEL_LIST;

            const rekapData = siswaKelas.map(siswa => {
                let row = { NISN: siswa.NISN, Nama: siswa.Nama };
                let totalSkor = 0, mapelDikerjakan = 0;
                mapelToDisplay.forEach(m => {
                    const targetSafe = `${String(m).trim()} - ${String(selectedKelas).trim()}`.toLowerCase();
                    const hasilSiswa = (dbHasil || []).find(h => h && String(h.NISN) === String(siswa.NISN) && h.Mapel && String(h.Mapel).trim().toLowerCase() === targetSafe);
                    if (hasilSiswa && hasilSiswa.Skor !== undefined && !isNaN(parseInt(hasilSiswa.Skor))) {
                        const skor = parseInt(hasilSiswa.Skor);
                        row[m] = skor; totalSkor += skor; mapelDikerjakan++;
                    } else row[m] = '-';
                });
                row['Rata_Rata'] = mapelDikerjakan > 0 ? (totalSkor / mapelDikerjakan).toFixed(1) : '-';
                return row;
            });

            const handleExportCSV = () => {
                if (rekapData.length === 0) return;
                const headers = ['NISN', 'Nama', ...mapelToDisplay, 'Rata_Rata'];
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rekapData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(","))].join("\n");
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `Rekapitulasi_${selectedKelas}.csv`); link.click();
            };

            const guruKelasObj = (dbGuru || []).find(g => g && String(g.Kelas_Guru).trim().toLowerCase() === String(selectedKelas).trim().toLowerCase());
            const namaGuruTertanda = guruKelasObj ? guruKelasObj.Nama_Guru : '(Belum diset)';

            return (
                <div className="print-area print:block print:w-full print:h-auto print:overflow-visible">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 print-hidden">
                        <div className="flex items-center gap-3">
                            {(isAdmin || isGuruMapel) && <button onClick={() => setSelectedKelas('')} className="bg-slate-200 hover:bg-slate-300 px-3 py-2 rounded-lg font-bold"><i className="fas fa-arrow-left"></i></button>}
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800">Rekapitulasi: {selectedKelas}</h2>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.print()} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                <i className="fas fa-file-pdf"></i> Cetak PDF
                            </button>
                            <button onClick={handleExportCSV} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow">
                                <i className="fas fa-file-excel"></i> Export Rekap
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto custom-scrollbar print:border-none print:shadow-none print:overflow-visible print:w-full">
                        <div className="print-visible text-center mb-6 border-b-2 border-black pb-4 mt-6">
                            <h2 className="text-2xl font-black text-black uppercase">Rekapitulasi Nilai Akhir</h2>
                            <h3 className="text-lg font-bold text-black mt-1">KELAS: {selectedKelas}</h3>
                            <p className="text-sm font-medium mt-1 uppercase">{appConfig?.namaSekolah || 'Sekolah'}</p>
                        </div>
                        <table className="w-full text-left text-sm whitespace-nowrap md:min-w-max print:whitespace-normal print:min-w-full rekap-table">
                            <thead className="bg-slate-100 text-slate-600">
                                <tr>
                                    <th className="p-4 print:p-1 border-b font-bold sticky left-0 bg-slate-100 z-10 w-12 print:static print:w-auto">No</th>
                                    <th className="p-4 print:p-1 border-b font-bold sticky left-12 bg-slate-100 z-10 w-24 print:static print:w-auto">NISN</th>
                                    <th className="p-4 print:p-1 border-b font-bold sticky left-36 bg-slate-100 z-10 shadow-[1px_0_2px_rgba(0,0,0,0.05)] print:static print:shadow-none print:w-auto">Nama Siswa</th>
                                    {mapelToDisplay.map(m => <th key={m} className="p-4 print:p-1 border-b font-bold text-center">{m}</th>)}
                                    <th className="p-4 print:p-1 border-b font-bold text-center text-blue-600 bg-blue-50 print:bg-white print:text-black">Rata-rata</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rekapData.length > 0 ? rekapData.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50 border-b">
                                        <td className="p-4 print:p-1 font-bold sticky left-0 bg-white z-10 w-12 print:static print:w-auto">{i+1}</td>
                                        <td className="p-4 print:p-1 font-mono sticky left-12 bg-white z-10 w-24 print:static print:w-auto">{row.NISN}</td>
                                        <td className="p-4 print:p-1 font-bold sticky left-36 bg-white z-10 shadow-[1px_0_2px_rgba(0,0,0,0.05)] print:static print:shadow-none print:w-auto">{row.Nama}</td>
                                        {mapelToDisplay.map(m => <td key={m} className={`p-4 print:p-1 text-center font-medium ${row[m] === '-' ? 'text-slate-300' : 'text-slate-700 print:text-black'}`}>{row[m]}</td>)}
                                        <td className="p-4 print:p-1 text-center font-black text-blue-600 bg-blue-50/30 print:bg-white print:text-black">{row.Rata_Rata}</td>
                                    </tr>
                                )) : (
                                    <tr><td colSpan={mapelToDisplay.length + 4} className="p-6 text-center text-slate-500">Tidak ada data siswa.</td></tr>
                                )}
                            </tbody>
                        </table>
                        
                        <div className="print-visible mt-12 flex justify-end text-black">
                            <div className="text-center mr-10">
                                <p className="mb-16">Mengetahui,</p>
                                <p className="font-bold underline uppercase">{namaGuruTertanda}</p>
                                <p>Wali {selectedKelas}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ==========================================
           LAPORAN BERITA ACARA (HANYA ADMIN)
           ========================================== */
        const LaporanBeritaAcara = ({ dbJadwal, dbSiswa, dbHasil, appConfig }) => {
            const [selectedTes, setSelectedTes] = useState('');
            const [isPrinting, setIsPrinting] = useState(false);

            if (!dbJadwal || dbJadwal.length === 0) return <div className="p-6 bg-white rounded-xl border text-slate-500">Belum ada jadwal ujian di kelas ini.</div>;
            
            const jadwalAktif = dbJadwal.find(j => j && j.ID_Tes === selectedTes);
            
            let daftarHadir = jadwalAktif ? (dbSiswa || []).filter(s => s).map(siswa => {
                const mapelJadwalSafe = String(jadwalAktif.Mapel).trim().toLowerCase();
                const hasilSiswa = (dbHasil || []).find(h => h && String(h.NISN) === String(siswa.NISN) && h.Mapel && String(h.Mapel).trim().toLowerCase() === mapelJadwalSafe);
                return { 
                    ...siswa, 
                    hadir: !!hasilSiswa, 
                    skor: hasilSiswa ? hasilSiswa.Skor : '-', 
                    timestamp: hasilSiswa ? hasilSiswa.Timestamp : '-' 
                };
            }) : [];

            return (
                <div>
                    <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 print-hidden">Laporan & Berita Acara</h2>
                    <div className="bg-white p-6 rounded-xl shadow-sm border mb-6 print-hidden">
                        <select className="w-full max-w-md px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none bg-white" value={selectedTes} onChange={(e) => setSelectedTes(e.target.value)}>
                            <option value="">-- Pilih Ujian Dicetak --</option>
                            {(dbJadwal || []).filter(j => j).map((j, i) => <option key={i} value={j.ID_Tes}>{j.Mapel} - {j.Waktu_Mulai}</option>)}
                        </select>
                        {jadwalAktif && <button onClick={() => setIsPrinting(true)} className="mt-4 bg-red-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-red-700 w-full md:w-auto"><i className="fas fa-print mr-2"></i> Preview Cetak</button>}
                    </div>

                    {isPrinting && jadwalAktif && (
                        <div className="fixed inset-0 z-50 overflow-y-auto bg-black/60 print:bg-white print:static print:block">
                            <div className="min-h-screen flex justify-center p-6 print:p-0 print:min-h-0">
                                <div className="bg-white p-10 rounded-xl max-w-4xl w-full print:shadow-none print:w-full print:p-0">
                                    <div className="border-b-4 border-double border-black pb-4 mb-6 flex items-center gap-6">
                                        {appConfig.logo ? <img src={getSafeImageUrl(appConfig.logo)} alt="Logo Sekolah" className="h-20 object-contain print:block" /> : <div className="h-20 w-20 bg-slate-100 flex items-center justify-center border border-black"><span className="text-xs">Logo</span></div>}
                                        <div className="flex-1 text-center pr-20">
                                            <h1 className="text-2xl font-black uppercase print:text-black">{appConfig.namaSekolah}</h1>
                                            <p className="text-sm font-bold uppercase print:text-black">{appConfig.namaUjian}</p>
                                            <p className="text-xs font-medium print:text-black">Laporan Resmi Evaluasi & Pelaksanaan Ujian</p>
                                        </div>
                                    </div>
                                    <h2 className="text-xl font-bold text-center underline uppercase mb-6 print:text-black">Berita Acara Pelaksanaan Ujian</h2>
                                    <div className="text-sm space-y-2 mb-8 print:text-black">
                                        <p>Pada hari ini, telah dilaksanakan evaluasi akademik secara digital untuk sesi ujian berikut:</p>
                                        <table className="mt-4 ml-4">
                                            <tbody>
                                                <tr><td className="w-40 font-bold">Mata Pelajaran / Kelas</td><td>: {jadwalAktif.Mapel}</td></tr>
                                                <tr><td className="font-bold">Waktu Mulai</td><td>: {jadwalAktif.Waktu_Mulai}</td></tr>
                                                <tr><td className="font-bold">Durasi Ujian</td><td>: {jadwalAktif.Durasi} Menit</td></tr>
                                                <tr><td className="font-bold">Total Terdaftar</td><td>: {daftarHadir.length} Siswa</td></tr>
                                                <tr><td className="font-bold">Hadir Ujian</td><td>: {daftarHadir.filter(s => s.hadir).length} Siswa</td></tr>
                                                <tr><td className="font-bold">Tidak Hadir</td><td>: {daftarHadir.filter(s => !s.hadir).length} Siswa</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    <table className="w-full text-sm border-collapse border border-black mb-10 print:text-black">
                                        <thead>
                                            <tr><th className="border border-black p-2 bg-slate-100 print:bg-white w-12">No</th><th className="border border-black p-2 bg-slate-100 print:bg-white">NISN</th><th className="border border-black p-2 bg-slate-100 print:bg-white">Nama Siswa</th><th className="border border-black p-2 bg-slate-100 print:bg-white text-center">Kelas</th><th className="border border-black p-2 bg-slate-100 print:bg-white text-center">Kehadiran</th></tr>
                                        </thead>
                                        <tbody>
                                            {daftarHadir.map((siswa, idx) => (
                                                <tr key={idx}>
                                                    <td className="border border-black p-2 text-center">{idx + 1}</td><td className="border border-black p-2 font-mono">{siswa.NISN}</td><td className="border border-black p-2">{siswa.Nama}</td><td className="border border-black p-2 text-center">{siswa.Kelas}</td>
                                                    <td className="border border-black p-2 text-center">{siswa.hadir ? <span className="font-bold text-green-600">Hadir</span> : <span className="font-bold text-red-600">Absen</span>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div className="flex justify-end mt-12 print:text-black">
                                        <div className="text-center">
                                            <p className="mb-16">Pengawas Ruangan,</p>
                                            <p className="font-bold underline">___________________________</p>
                                        </div>
                                    </div>
                                    <div className="mt-10 flex gap-4 print-hidden border-t pt-6">
                                        <button onClick={() => setIsPrinting(false)} className="px-6 py-2 bg-slate-200 rounded-lg font-bold">Tutup</button>
